<script>
/* =========================================================================
   Calificador de Ofertas — FAP / FIAS
   Herramienta 100% del lado del cliente (sin backend, sin CDN de scripts).
   Cubre los dos esquemas de calificación que usa el FAP en sus convocatorias:
     A) POR PUNTOS  — consultorías y servicios: criterios técnicos ponderados
        + oferta económica inverso-proporcional, con umbral técnico mínimo.
     B) CUMPLE / NO CUMPLE — bienes/servicios con postcalificación: requisitos
        legales y técnicos habilitantes y adjudicación al menor precio.
   ========================================================================= */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = (p='id')=>p+Math.random().toString(36).slice(2,8);
const num = v => { const n = parseFloat(String(v==null?'':v).replace(/[^\d.,-]/g,'').replace(/\.(?=\d{3}\b)/g,'').replace(',','.')); return isFinite(n)?n:0; };
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const r2 = n => Math.round(n*100)/100;
const fUSD = n => '$'+(num(n)).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const fNum = n => (Math.round(n*100)/100).toLocaleString('es-EC',{maximumFractionDigits:2});
const todayEC = ()=> new Date().toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'});

/* Número a letras (dólares) para el acta: "CUARENTA MIL CON 00/100 DÓLARES…" */
function enteroALetras(n){
  const U=['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
  const D=['','','','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const C=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  if(n===0) return 'cero';
  const sec=x=>{ if(x===0)return''; if(x===100)return'cien'; let o=''; const c=Math.floor(x/100), r=x%100, d=Math.floor(r/10), u=r%10; if(c)o+=C[c]+' '; if(r<30)o+=U[r]; else{o+=D[d]; if(u)o+=' y '+U[u];} return o.trim(); };
  const apoc=s=>s.replace(/uno$/,'ún'); // "veintiún mil"
  let o='';
  const mill=Math.floor(n/1e6), miles=Math.floor((n%1e6)/1000), resto=n%1000;
  if(mill) o+=(mill===1?'un millón':apoc(sec(mill))+' millones')+' ';
  if(miles) o+=(miles===1?'mil':apoc(sec(miles))+' mil')+' ';
  if(resto) o+=sec(resto);
  return o.trim();
}
function numeroALetras(v){
  const n=num(v), ent=Math.floor(n), cts=Math.round((n-ent)*100);
  return (enteroALetras(ent)+' con '+String(cts).padStart(2,'0')+'/100 dólares de los Estados Unidos de América').toUpperCase();
}

/* Rellena campos nuevos en procesos guardados con versiones anteriores de la herramienta
   y migra la comisión de texto (una línea por miembro) a la estructura {nombre,cargo,rol}. */
function normalize(s){
  const d = blankState(s.tipo||'puntos');
  for(const k in d){ if(s[k]===undefined) s[k]=d[k]; }
  if(typeof s.comision==='string'){
    const roles=['Presidente/a de la Comisión','Miembro','Secretario/a'];
    const lines=s.comision.split('\n').map(x=>x.trim()).filter(Boolean);
    s.comision = (lines.length?lines:['','','']).map((l,i)=>({nombre:'', cargo:l, rol:roles[i]||'Miembro'}));
  }
  if(!Array.isArray(s.comision)||!s.comision.length) s.comision=d.comision;
  return s;
}

/* helpers over the model */
const gruposTecnicos = ()=> (S.grupos||[]).filter(g=>g.tipo==='tecnico');
const grupoEco = ()=> (S.grupos||[]).find(g=>g.tipo==='economico') || {peso:0,formula:S.tipo==='cumple'?'menor':'inverso',nombre:'Oferta económica'};
const critList  = ()=> gruposTecnicos().flatMap(g=>g.criterios.map(c=>({...c,grupo:g.nombre,gid:g.id})));
const gateList  = ()=> [...(S.reqLegales||[]).map(r=>({...r,fase:'legal'})), ...(S.reqTecnicos||[]).map(r=>({...r,fase:'tecnico'}))];
const tecMaxTotal = ()=> gruposTecnicos().reduce((a,g)=>a+g.criterios.reduce((x,c)=>x+num(c.max),0),0);
const puntosTotales = ()=> tecMaxTotal() + num(grupoEco().peso);

/* --------------------------------- engine -------------------------------- */
function compute(){
  const ofs = S.oferentes||[];
  const eco = grupoEco();
  const pesoEco = num(eco.peso);
  const presup = num(S.presupuesto);
  ofs.forEach(o=>{
    o._tec=0; o._tecMax=tecMaxTotal(); o._eco=0; o._total=0; o._pasa=false; o._rank=null; o._motivo='';
    const p=num(o.precio);
    // 1) evaluación técnica / requisitos
    let tecOk=true;
    if(S.tipo==='puntos'){
      let t=0; critList().forEach(c=>{ t += clamp(num(o.scores[c.id]),0,num(c.max)); });
      o._tec=r2(t);
      tecOk = o._tec >= num(S.umbralTecnico);
    }else{
      o._legalOk = (S.reqLegales||[]).every(r=>o.gates[r.id]===true);
      o._tecOk   = (S.reqTecnicos||[]).every(r=>o.gates[r.id]===true);
      tecOk = o._legalOk && o._tecOk;
    }
    o._tecPass = tecOk;  // superó la evaluación técnica / requisitos (independiente del precio)
    // 2) ¿supera el presupuesto referencial? (solo si hay presupuesto y precio)
    o._sobrepasa = presup>0 && p>0 && p>presup;
    // 3) causa por la que NO pasa (en orden de prelación de motivos)
    if(o.descal)            o._motivo = (o.descalMotivo||'').trim() || 'Rechazada por decisión de la Comisión';
    else if(!tecOk)         o._motivo = S.tipo==='puntos' ? 'No alcanza el umbral técnico'
                                        : (!o._legalOk ? 'No cumple requisitos legales' : 'No cumple requisitos técnicos');
    else if(o._sobrepasa)   o._motivo = 'Supera el presupuesto referencial';
    o._pasa = !o.descal && tecOk && !o._sobrepasa;
  });
  // económico: solo entre quienes pasan y tienen precio válido
  const validos = ofs.filter(o=>o._pasa && num(o.precio)>0);
  const pmin = validos.length ? Math.min(...validos.map(o=>num(o.precio))) : 0;
  ofs.forEach(o=>{
    const p=num(o.precio);
    if(o._pasa && p>0 && pmin>0){
      o._eco = r2((S.tipo==='cumple'?100:pesoEco) * (pmin/p));
    }
    o._total = S.tipo==='puntos' ? r2(o._tec + (o._pasa?o._eco:0)) : (o._pasa?o._eco:0);
  });
  const passers = ofs.filter(o=>o._pasa);
  const ranked = [...passers].sort((a,b)=> S.tipo==='cumple' ? num(a.precio)-num(b.precio) : b._total-a._total);
  ranked.forEach((o,i)=>o._rank=i+1);
  return { pmin, pesoEco, winner:ranked[0]||null, ranked, nPass:passers.length, nTot:ofs.length, presup };
}

  save();
}

  const ep=$("#ecoPeso"); if(ep) ep.onchange=()=>{ grupoEco().peso=num(ep.value); render(); };
  // requisitos (cumple)
  $$(".reqname").forEach(el=>el.onchange=()=>{ const arr = el.dataset.fase==='legal'?S.reqLegales:S.reqTecnicos; const r=arr.find(x=>x.id===el.dataset.r); if(r){r.nombre=el.value; render();} });
  $$(".addReq").forEach(el=>el.onclick=()=>{ const k=el.dataset.fase==='legal'?'reqLegales':'reqTecnicos'; S[k]=[...(S[k]||[]),{id:uid(el.dataset.fase[0]),nombre:''}]; render(); });
  $$(".delReq").forEach(el=>el.onclick=()=>{ const k=el.dataset.fase==='legal'?'reqLegales':'reqTecnicos'; S[k]=(S[k]||[]).filter(r=>r.id!==el.dataset.r); render(); });
}

/* ---- panel 3: oferentes (matriz de calificación) ---- */
function viewOferentes(){
  const ofs=S.oferentes||[];
  return `
  <div class="panel no-print">
    <div class="phead">
      <div class="n">3</div>
      <div class="grow">
        <div class="ptitle">Oferentes y calificación</div>
        <div class="psub">${S.tipo==='puntos'
          ? 'Ingresa el puntaje consolidado de la Comisión por cada criterio (0 al máximo) y el precio ofertado.'
          : 'Marca Cumple / No cumple por cada requisito y el precio ofertado.'}</div>
      </div>
      <button class="btn sm" id="addOf">+ Oferente</button>
    </div>
    ${ofs.length? `<div class="tablewrap">${S.tipo==='puntos'?matrizPuntos():matrizCumple()}</div>` : `<div class="empty">Aún no hay oferentes. Pulsa <b>+ Oferente</b> para empezar.</div>`}
  </div>`;
}
function matrizPuntos(){
  const grupos=gruposTecnicos();
  const eco=grupoEco();
  let h='<table class="mx"><thead><tr><th rowspan="2" style="text-align:left">Oferente</th>';
  grupos.forEach(g=>{ h+=`<th class="grp" colspan="${g.criterios.length}">${esc(g.nombre)}</th>`; });
  h+=`<th rowspan="2">Precio<br>(USD)</th><th rowspan="2"></th></tr><tr>`;
  grupos.forEach(g=>g.criterios.forEach(c=>{ h+=`<th class="cn">${esc(c.nombre.length>46?c.nombre.slice(0,44)+'…':c.nombre)}<small>/ ${fNum(num(c.max))}</small></th>`; }));
  h+='</tr></thead><tbody>';
  S.oferentes.forEach(o=>{
    h+=`<tr class="${o.descal?'rechRow':''}">${ofNameCell(o)}`;
    grupos.forEach(g=>g.criterios.forEach(c=>{
      const v=o.scores[c.id]; const over=num(v)>num(c.max);
      h+=`<td class="cell"><input class="scoreIn ${over?'over':''}" data-of="${o.id}" data-c="${c.id}" value="${v==null?'':esc(v)}" inputmode="decimal" title="máx ${fNum(num(c.max))}"></td>`;
    }));
    h+=priceCell(o)+ofActions(o)+'</tr>';
  });
  h+='</tbody></table>';
  return h;
}
/* Celdas compartidas por las dos matrices */
function overPresup(o){ const p=num(o.precio), pr=num(S.presupuesto); return pr>0 && p>0 && p>pr; }
function ofNameCell(o){
  return `<td class="of">
    <input class="in ofn" data-of="${o.id}" data-k="nombre" value="${esc(o.nombre)}" placeholder="Razón social / nombre">
    <input class="in ofr" data-of="${o.id}" data-k="ruc" value="${esc(o.ruc)}" placeholder="RUC / cédula" style="font-size:12px">
    ${o.descal?`<div class="miniof" style="color:var(--red);font-weight:700">⊘ Rechazada por la Comisión</div>`:''}</td>`;
}
function priceCell(o){
  return `<td class="pricec"><input class="priceIn ${overPresup(o)?'over':''}" data-of="${o.id}" value="${esc(o.precio)}" inputmode="decimal" placeholder="0.00" title="${overPresup(o)?'Supera el presupuesto referencial ('+fUSD(S.presupuesto)+')':''}">${overPresup(o)?'<div class="miniof" style="color:var(--red);font-weight:700;text-align:right">↑ sobre presupuesto</div>':''}</td>`;
}
function ofActions(o){
  return `<td style="white-space:nowrap">
    <button class="btn ghost xs rechOf" data-of="${o.id}" title="${o.descal?'Habilitar esta oferta':'Rechazar / descalificar esta oferta (decisión de la Comisión)'}" style="color:${o.descal?'var(--green)':'var(--red)'};font-size:14px">${o.descal?'↺':'⊘'}</button>
    <button class="btn ghost xs delOf" data-of="${o.id}" title="Eliminar oferente">✕</button>
  </td>`;
}
function matrizCumple(){
  const L=S.reqLegales||[], T=S.reqTecnicos||[];
  let h='<table class="mx"><thead><tr><th rowspan="2" style="text-align:left">Oferente</th>';
  if(L.length) h+=`<th class="grp" colspan="${L.length}">Requisitos legales</th>`;
  if(T.length) h+=`<th class="grp" colspan="${T.length}">Requisitos técnicos</th>`;
  h+=`<th rowspan="2">Precio<br>(USD)</th><th rowspan="2"></th></tr><tr>`;
  [...L,...T].forEach(r=>{ h+=`<th class="cn">${esc(r.nombre.length>40?r.nombre.slice(0,38)+'…':r.nombre)}</th>`; });
  h+='</tr></thead><tbody>';
  S.oferentes.forEach(o=>{
    h+=`<tr class="${o.descal?'rechRow':''}">${ofNameCell(o)}`;
    [...L,...T].forEach(r=>{
      const v=o.gates[r.id]; const cls=v===true?'si':v===false?'no':'';
      h+=`<td><select class="cn-sel gateIn ${cls}" data-of="${o.id}" data-r="${r.id}"><option value="">—</option><option value="1" ${v===true?'selected':''}>Cumple</option><option value="0" ${v===false?'selected':''}>No</option></select></td>`;
    });
    h+=priceCell(o)+ofActions(o)+'</tr>';
  });
  h+='</tbody></table>';
  return h;
}
function bindOferentes(){
  const add=$("#addOf"); if(add) add.onclick=()=>{ S.oferentes.push(emptyOf(S)); render(); };
  $$(".delOf").forEach(el=>el.onclick=()=>{ S.oferentes=S.oferentes.filter(o=>o.id!==el.dataset.of); render(); });
  const of=id=>S.oferentes.find(o=>o.id===id);
  $$(".ofn,.ofr").forEach(el=>el.oninput=()=>{ const o=of(el.dataset.of); if(o){o[el.dataset.k]=el.value; renderResultados(); save();} });
  $$(".scoreIn").forEach(el=>el.oninput=()=>{ const o=of(el.dataset.of); if(o){ o.scores[el.dataset.c]=el.value; const c=critList().find(x=>x.id===el.dataset.c); el.classList.toggle('over', c && num(el.value)>num(c.max)); renderResultados(); save(); } });
  $$(".priceIn").forEach(el=>el.oninput=()=>{ const o=of(el.dataset.of); if(o){o.precio=el.value; const pr=num(S.presupuesto); el.classList.toggle('over', pr>0 && num(el.value)>pr); renderResultados(); save();} });
  $$(".gateIn").forEach(el=>el.onchange=()=>{ const o=of(el.dataset.of); if(o){ o.gates[el.dataset.r]= el.value===''?null:(el.value==='1'); el.className='cn-sel gateIn '+(el.value==='1'?'si':el.value==='0'?'no':''); renderResultados(); save(); } });
  $$(".rechOf").forEach(el=>el.onclick=()=>{ const o=of(el.dataset.of); if(!o) return;
    if(!o.descal){ const m=prompt('Motivo del rechazo / descalificación (opcional):', o.descalMotivo||''); o.descal=true; o.descalMotivo=(m||'').trim(); }
    else { o.descal=false; o.descalMotivo=''; }
    render();
  });
}

/* ---- panel 4: resultados ---- */
function renderResultados(){
  const R=compute();
  const box=$("#resultados"); if(!box) return;
  const ofs=S.oferentes||[];
  const conNombre=ofs.filter(o=>o.nombre.trim()||o.precio);
  const nSobre = ofs.filter(o=>o._sobrepasa && !o.descal).length;
  let winnerBanner='';
  if(R.winner){
    const w=R.winner;
    winnerBanner=`
    <div class="winner">
      <div class="medal">${icoTrophy()}</div>
      <div style="flex:1;min-width:0">
        <div class="wt">Oferta recomendada para adjudicación</div>
        <div class="wn">${esc(w.nombre||'(sin nombre)')}</div>
        <div class="ws">${S.tipo==='puntos'
          ? `Puntaje total <b>${fNum(w._total)} / ${fNum(puntosTotales())}</b> — Técnico ${fNum(w._tec)} + Económico ${fNum(w._eco)}`
          : `Cumple todos los requisitos · <b>menor precio</b>`} · Precio <b>${fUSD(w.precio)}</b> (${esc(numeroALetras(w.precio))})</div>
      </div>
    </div>`;
  } else if(conNombre.length){
    winnerBanner=`
    <div class="winner" style="background:var(--redbg);border-color:#E6BFBF">
      <div class="medal" style="background:var(--red)">!</div>
      <div style="flex:1;min-width:0">
        <div class="wt" style="color:var(--red)">Sin oferta adjudicable — se recomienda declarar desierto</div>
        <div class="ws">Ninguna oferta reúne las condiciones para ser adjudicada. Revisa los motivos en la tabla${nSobre?' (hay ofertas que superan el presupuesto)':''}.</div>
      </div>
    </div>`;
  }
  const avisoPres = nSobre ? `<div class="hint" style="margin-top:0;margin-bottom:14px;background:var(--redbg);border-color:#E6BFBF;color:#8A2A2A">
      <b>${nSobre} oferta(s) superan el presupuesto referencial</b> de ${fUSD(S.presupuesto)} y por eso <b>no se recomiendan para adjudicación</b>. Si el valor es correcto y el presupuesto no, corrígelo arriba; si un oferente debe rechazarse por otra causa, usa el botón <b>⊘ Rechazar</b>.</div>` : '';
  box.innerHTML=`
  <div class="panel no-print">
    <div class="phead">
      <div class="n">4</div>
      <div class="grow"><div class="ptitle">Resultados de la calificación</div>
      <div class="psub">${R.nPass} de ${R.nTot} oferente(s) ${S.tipo==='puntos'?`superan el umbral de ${fNum(num(S.umbralTecnico))} pts`:'cumplen todos los requisitos'}${R.presup?` y no superan el presupuesto (${fUSD(S.presupuesto)})`:''}. ${R.pmin?`Precio más bajo (válido): ${fUSD(R.pmin)}.`:''} La herramienta <b>recomienda</b> según la regla de las bases; la Comisión decide (puede rechazar con causa o declarar desierto en el acta).</div></div>
    </div>
    ${avisoPres}
    ${winnerBanner}
    ${conNombre.length? tablaResultados(R) : `<div class="empty">Completa la matriz para ver los resultados.</div>`}
  </div>`;
  renderActa(R);
}
function tablaResultados(R){
  const ofs=S.oferentes||[];
  const ordered=[...ofs].sort((a,b)=>{
    if(a._pasa!==b._pasa) return a._pasa?-1:1;
    return S.tipo==='cumple' ? (num(a.precio)||1e15)-(num(b.precio)||1e15) : b._total-a._total;
  });
  const totMax=puntosTotales();
  let h='<div class="tablewrap"><table class="rz"><thead><tr><th>#</th><th>Oferente</th>';
  if(S.tipo==='puntos') h+=`<th>Técnico</th><th>Umbral</th><th>Económico</th><th>Total</th><th style="width:130px">Ranking</th>`;
  else h+=`<th>Legal</th><th>Técnico</th><th>Estado</th>`;
  h+='<th class="num">Precio</th></tr></thead><tbody>';
  ordered.forEach(o=>{
    const win = R.winner && o.id===R.winner.id;
    const cls = win?'win':(!o._pasa?'out':'');
    h+=`<tr class="${cls}"><td>${o._rank?`<span class="rankpill ${o._rank===1?'one':''}">${o._rank}</span>`:'—'}</td>`;
    h+=`<td><b>${esc(o.nombre||'(sin nombre)')}</b>${o.ruc?`<div class="miniof">RUC/CI: ${esc(o.ruc)}</div>`:''}</td>`;
    const motivoTag = o._pasa ? '' : `<div class="miniof" style="color:var(--red)">${esc(o._motivo||'No pasa')}</div>`;
    if(S.tipo==='puntos'){
      const pct = totMax? clamp(o._total/totMax*100,0,100):0;
      h+=`<td class="num">${fNum(o._tec)} / ${fNum(o._tecMax)}</td>`;
      h+=`<td>${o._pasa?'<span class="badge b-g">Pasa</span>':`<span class="badge b-r">No pasa</span>${motivoTag}`}</td>`;
      h+=`<td class="num">${o._pasa?fNum(o._eco):'—'}</td>`;
      h+=`<td class="num"><b>${fNum(o._total)}</b><div class="bar" style="margin-top:5px"><i style="width:${pct}%;background:${win?'var(--green)':'var(--navy)'}"></i></div></td>`;
    }else{
      h+=`<td>${o._legalOk?'<span class="badge b-g">Cumple</span>':'<span class="badge b-r">No</span>'}</td>`;
      h+=`<td>${o._tecOk?'<span class="badge b-g">Cumple</span>':'<span class="badge b-r">No</span>'}</td>`;
      h+=`<td>${o._pasa?(win?'<span class="badge b-g">Adjudicado</span>':'<span class="badge b-n">Habilitado</span>'):`<span class="badge b-r">Descalificado</span>${motivoTag}`}</td>`;
    }
    h+=`<td class="num">${o.precio?fUSD(o.precio):'—'}${o._sobrepasa&&!o.descal?'<div class="miniof" style="color:var(--red)">↑ sobre presupuesto</div>':''}</td></tr>`;
  });
  h+='</tbody></table></div>';
  return h;
}

/* ---- acta / informe imprimible ---- */
function renderActa(R){
  const box=$("#acta"); if(!box) return;
  const ofs=(S.oferentes||[]).filter(o=>o.nombre.trim()||o.precio);
  const com=S.comision||[];
  const pres = com.find(m=>/presiden/i.test(m.rol))||com[0]||{};
  const secr = com.find(m=>/secretar/i.test(m.rol))||com[com.length-1]||{};
  const ivaP = num(S.ivaPct)||0;
  const totMax=puntosTotales();
  // A la fase económica pasan quienes superaron la técnica y no fueron rechazados; entre ellos,
  // los que superan el presupuesto se muestran pero no se adjudican.
  const calificados = ofs.filter(o=>o._tecPass && !o.descal);
  const presLetras = S.presupuesto? numeroALetras(S.presupuesto):'—';
  const colH = o=>esc(o.nombre?trunc(o.nombre,22):'Proponente');
  const trunc=(s,n)=>s.length>n?s.slice(0,n-1)+'…':s;

  // DATOS DEL PROCESO
  const kv=(l,v)=>`<tr><th style="width:36%">${l}</th><td>${v||'—'}</td></tr>`;
  const datos=`<table>${
    kv('Objeto de la contratación', esc(S.objeto))+
    kv('Área protegida / instancia beneficiaria', esc(S.area))+
    kv('Modalidad de selección', esc(S.modalidad))+
    kv('Presupuesto referencial (USD, IVA incluido)', S.presupuesto?`${fUSD(S.presupuesto)} (${esc(presLetras)})`:'—')+
    kv('Fuente de financiamiento / PAG', esc([S.partida,S.lineaNombre].filter(Boolean).join(' — ')))+
    kv('Fecha de invitación', esc(S.fechaInvitacion))+
    kv('Plazo para presentación de ofertas', esc(S.fechaLimiteOfertas))
  }</table>`;

  // QUÓRUM
  const quorum=`<h3>Constatación de quórum</h3><table><thead><tr><th>Nombre</th><th>Cargo institucional</th><th>Rol en la Comisión</th><th>Asistencia</th></tr></thead><tbody>${
    com.map(m=>`<tr><td>${esc(m.nombre||'(por designar)')}</td><td>${esc(m.cargo)}</td><td>${esc(m.rol)}</td><td>Presencial / Virtual</td></tr>`).join('')
  }</tbody></table>`;

  // PRIMERO — proponentes recibidos
  const recibidos=`<table><thead><tr><th>Proponente</th><th>Fecha de entrega</th><th>Hora</th><th>Estado</th></tr></thead><tbody>${
    (ofs.length?ofs:[{nombre:''}]).map(o=>`<tr><td>${esc(o.nombre||'—')}</td><td>____________</td><td>__:__</td><td>A tiempo ☐&nbsp;&nbsp;Extemporánea ☐</td></tr>`).join('')
  }</tbody></table>`;

  // SEGUNDO — evaluación técnica
  let tecnico;
  if(S.tipo==='cumple'){
    tecnico=`<table><thead><tr><th>Parámetro técnico</th>${ofs.map(o=>`<th class="n">${colH(o)}</th>`).join('')}</tr></thead><tbody>${
      gateList().map(r=>`<tr><td>${esc(r.nombre)}</td>${ofs.map(o=>`<td class="n">${o.gates[r.id]===true?'Cumple':o.gates[r.id]===false?'No cumple':'—'}</td>`).join('')}</tr>`).join('')
    }<tr><th>Resultado de la evaluación técnica</th>${ofs.map(o=>`<td class="n"><b>${o._tecPass?(o.descal?'RECHAZADA':'CALIFICA'):'NO CALIFICA'}</b></td>`).join('')}</tr></tbody></table>`;
  }else{
    tecnico=`<table><thead><tr><th>Criterio de evaluación</th><th class="n">Máx.</th>${ofs.map(o=>`<th class="n">${colH(o)}</th>`).join('')}</tr></thead><tbody>${
      critList().map(c=>`<tr><td>${esc(c.nombre)}</td><td class="n">${fNum(num(c.max))}</td>${ofs.map(o=>`<td class="n">${o.scores[c.id]==null||o.scores[c.id]===''?'—':fNum(clamp(num(o.scores[c.id]),0,num(c.max)))}</td>`).join('')}</tr>`).join('')
    }<tr><th>Subtotal técnico</th><td class="n">${fNum(tecMaxTotal())}</td>${ofs.map(o=>`<td class="n"><b>${fNum(o._tec)}</b></td>`).join('')}</tr>`+
    `<tr><th>Umbral técnico (${fNum(num(S.umbralTecnico))})</th><td class="n">—</td>${ofs.map(o=>`<td class="n">${o._tecPass?'Pasa':'No pasa'}</td>`).join('')}</tr></tbody></table>`;
  }

  // TERCERO — evaluación económica (solo calificados)
  const econRows = (label, fn) => `<tr><th>${label}</th>${calificados.map(o=>`<td class="n">${fn(o)}</td>`).join('')}</tr>`;
  const economico = calificados.length
    ? `<table><thead><tr><th>Concepto</th>${calificados.map(o=>`<th class="n">${colH(o)}</th>`).join('')}</tr></thead><tbody>${
        econRows(`Valor sin IVA (USD)`, o=>fUSD(num(o.precio)/(1+ivaP/100)))+
        econRows(`IVA (${fNum(ivaP)}%) (USD)`, o=>fUSD(num(o.precio)-num(o.precio)/(1+ivaP/100)))+
        econRows(`Valor total ofertado (USD)`, o=>`<b>${fUSD(o.precio)}</b>`)+
        (S.tipo==='puntos'? econRows(`Puntaje económico (${fNum(num(grupoEco().peso))})`, o=>fNum(o._eco)) : '')+
        (S.presupuesto? econRows(`¿Se ajusta al presupuesto referencial?`, o=>num(o.precio)<=num(S.presupuesto)?'Sí':'No') : '')+
        (S.tipo==='puntos'? econRows(`Puntaje total`, o=>`<b>${fNum(o._total)}</b> / ${fNum(totMax)}`) : '')
      }</tbody></table>${S.presupuesto?`<p style="font-size:11.5px;color:#6B7180">Presupuesto referencial: ${fUSD(S.presupuesto)}.</p>`:''}`
    : `<p style="font-size:12.5px"><i>Ningún proponente superó la evaluación técnica; no se abren ofertas económicas.</i></p>`;

  // CUARTO — adjudicación
  const w=R.winner;
  const adj = w
    ? `<p style="font-size:12.5px"><b>☑ Recomienda la adjudicación</b> a favor de <b>${esc(w.nombre||'')}</b> con RUC ${esc(w.ruc||'____________')}, por un valor total de <b>${fUSD(w.precio)}</b> (${esc(numeroALetras(w.precio))}), por ${S.tipo==='puntos'?`obtener el mayor puntaje total (${fNum(w._total)} de ${fNum(totMax)} puntos)`:'cumplir las condiciones solicitadas y ofertar el precio más bajo'}.</p>
       <p style="font-size:12.5px">☐ Declara desierto el procedimiento.</p>`
    : `<p style="font-size:12.5px">☐ Recomienda la adjudicación a favor de ____________________.</p>
       <p style="font-size:12.5px"><b>☑ Declara desierto</b> el procedimiento debido a que ${ofs.length?'ninguna de las ofertas se ajusta a lo solicitado':'no se presentaron ofertas'}.</p>`;

  // FIRMAS
  const firmas = `<div style="margin-top:10px">${com.map(m=>`<span class="firma"><span class="line"></span>${esc(m.nombre||'Nombre y apellido')}<br><b>${esc(m.rol)}</b><br><span style="color:#6B7180">${esc(m.cargo)}</span></span>`).join('')}</div>`;

  box.innerHTML=`
  <div class="acta">
    <div class="acta-doc" id="actaDoc">
      <div class="acta-lh"><div class="logo">FAP</div><div><div class="t1">FONDO DE INVERSIÓN AMBIENTAL SOSTENIBLE — FIAS</div><div class="t2">Programa Fondo de Áreas Protegidas (FAP) · Comisión de Calificación</div></div></div>
      <h2 class="actitle">Acta N.º ${esc(S.actaNo||'001')}</h2>
      <div class="acsub">Acta de calificación, selección y adjudicación — ${esc(S.objeto||'(objeto de la contratación)')}</div>

      <h3>Datos del proceso</h3>
      ${datos}

      <h3>Inicio de sesión</h3>
      <p style="font-size:12.5px">El día ${esc(S.fechaSesion||'____________')}, a las ${esc(S.horaSesion||'__h__')} horas, en ${esc(S.lugarSesion||'____________')}, se reúnen los miembros de la Comisión de Calificación, convocados por su Presidencia a través de Secretaría, para tratar el proceso de referencia.</p>
      ${quorum}
      <p style="font-size:12.5px">Constatado el quórum reglamentario, la Presidencia declara instalada la sesión y dispone dar lectura al orden del día: (1) antecedentes del proceso; (2) revisión y evaluación de ofertas técnicas; (3) revisión y evaluación de ofertas económicas; (4) selección y adjudicación; (5) varios.</p>

      <h3>Primero — Antecedentes del proceso</h3>
      <p style="font-size:12.5px">Mediante ${esc(S.memoNro?('memorando/resolución N.º '+S.memoNro):'memorando/resolución N.º ____________')}${S.fechaInicio?`, de fecha ${esc(S.fechaInicio)}`:''}, se solicitó el inicio del proceso de ${esc(S.modalidad||'selección')} para “${esc(S.objeto||'')}”. El presupuesto referencial corresponde a ${S.presupuesto?`${fUSD(S.presupuesto)} (${esc(presLetras)})`:'____________'}, previsto en el PAG aprobado. Se remitieron las invitaciones a proveedores calificados por el FIAS, recibiéndose las siguientes ofertas dentro del plazo previsto (hasta ${esc(S.fechaLimiteOfertas||'____________')}):</p>
      ${recibidos}

      <h3>Segundo — Revisión y evaluación de la oferta técnica</h3>
      <p style="font-size:12.5px">${S.tipo==='cumple'
        ? 'La Comisión verifica el cumplimiento de obligaciones y de las especificaciones técnicas bajo la modalidad Cumple / No cumple, con el siguiente resultado:'
        : `La Comisión califica las propuestas técnicas conforme a los criterios de las bases. Solo pasan a la evaluación económica quienes alcancen el umbral técnico de ${fNum(num(S.umbralTecnico))} de ${fNum(tecMaxTotal())} puntos.`}</p>
      ${tecnico}

      <h3>Tercero — Revisión y evaluación de la oferta económica</h3>
      ${economico}

      <h3>Cuarto — Selección y adjudicación</h3>
      ${adj}

      <h3>Quinto — Varios</h3>
      <p style="font-size:12.5px">Ninguno.</p>

      <h3>Cierre de la sesión</h3>
      <p style="font-size:12.5px">No existiendo más puntos que tratar, se da por terminada la sesión. Se dispone a Secretaría notificar la presente resolución al adjudicatario y a los proponentes no adjudicados, y remitir el expediente a la Coordinación del FAP para la elaboración del instrumento jurídico correspondiente. Como constancia de lo actuado y resuelto, los/las miembros de la Comisión de Calificación suscriben la presente acta.</p>
      ${firmas}
    </div>
  </div>`;
}

/* ---- panel 5: texto normalizado para las bases ---- */
function basesText(){
  const L=['\r'];
  if(S.tipo==='puntos'){
    const tot=puntosTotales(), tecMax=tecMaxTotal(), umbral=num(S.umbralTecnico), pesoEco=num(grupoEco().peso);
    const out=[];
    out.push(`CRITERIOS Y SUBCRITERIOS DE CALIFICACIÓN (sobre ${fNum(tot)} puntos)`);
    out.push('');
    out.push(`La calificación de las propuestas se realizará sobre un total de ${fNum(tot)} puntos, distribuidos en los siguientes parámetros:`);
    out.push('');
    gruposTecnicos().forEach(g=>{
      const s=g.criterios.reduce((a,c)=>a+num(c.max),0);
      out.push(`• ${g.nombre.toUpperCase()} — ${fNum(s)} puntos`);
      g.criterios.forEach(c=> out.push(`    - ${c.nombre}  (${fNum(num(c.max))} pts)`));
    });
    out.push(`• OFERTA ECONÓMICA — ${fNum(pesoEco)} puntos`);
    out.push(`    Se otorgará el máximo puntaje (${fNum(pesoEco)} pts) a la oferta más económica y, de forma inverso-proporcional, a las demás, aplicando la fórmula:`);
    out.push(`        Puntaje económico = ${fNum(pesoEco)} × (Precio más bajo ÷ Precio del oferente)`);
    out.push('');
    out.push(`UMBRAL TÉCNICO: pasarán a la evaluación de la oferta económica únicamente los oferentes que obtengan un mínimo de ${fNum(umbral)} puntos (sobre ${fNum(tecMax)}) en la evaluación técnica (perfil + oferta técnica).`);
    out.push('');
    out.push(`PUNTAJE TOTAL = puntaje técnico + puntaje económico. Se adjudicará al oferente que obtenga el mayor puntaje total.`);
    return out.join('\n');
  }
  const out=[];
  out.push('CRITERIOS DE CALIFICACIÓN');
  out.push('');
  out.push('Los requisitos legales y técnicos se evaluarán bajo la modalidad CUMPLE / NO CUMPLE y tienen carácter habilitante:');
  out.push('');
  out.push('REQUISITOS LEGALES:');
  (S.reqLegales||[]).forEach(r=>out.push(`    - ${r.nombre}`));
  out.push('');
  out.push('REQUISITOS TÉCNICOS:');
  (S.reqTecnicos||[]).forEach(r=>out.push(`    - ${r.nombre}`));
  out.push('');
  out.push('El oferente que no cumpla la totalidad de los requisitos legales no continuará en la evaluación técnica; y el que no cumpla la totalidad de los requisitos técnicos quedará descalificado y su oferta económica no será abierta ni considerada.');
  out.push('');
  out.push('ADJUDICACIÓN: entre los oferentes que cumplan la totalidad de los requisitos legales y técnicos, se adjudicará al de MENOR PRECIO.');
  return out.join('\n');
}

/* Rellena la plantilla oficial del acta de adjudicación con los datos del proceso,
   usando el mismo motor docxtemplater que La Mágica y el CLM. Elige la plantilla según
   el esquema: Cumple/No cumple (comparación de precios) o por puntos (con tablas de puntaje). */
function generarActaWord(){
  const DT=window.docxtemplater||window.Docxtemplater;
  if(!(window.PizZip && DT)){ toast('Motor de plantillas no disponible; usa “Imprimir acta”.'); return; }
  const R=compute();
  const com=S.comision||[];
  const pres=com.find(m=>/presiden/i.test(m.rol))||com[0]||{};
  const secr=com.find(m=>/secretar/i.test(m.rol))||com[com.length-1]||{};
  const medios=com.filter(m=>m!==pres&&m!==secr); // miembros intermedios → bucle {#items} del formato oficial
  const ofs=(S.oferentes||[]).filter(o=>o.nombre.trim()||o.precio);
  const cal=ofs.filter(o=>o._tecPass && !o.descal); // pasan a la fase económica (incluye los que superan presupuesto, marcados)
  const w=R.winner;
  const ivaP=num(S.ivaPct)||0;
  const sinIva=p=>fUSD(num(p)/(1+ivaP/100)), ivaVal=p=>fUSD(num(p)-num(p)/(1+ivaP/100));
  const enPres=o=>S.presupuesto?(num(o.precio)<=num(S.presupuesto)?'Sí':'No'):'—';
  const difPres=o=>{ if(!S.presupuesto) return '—'; const d=num(S.presupuesto)-num(o.precio); return (d<0?'-':'')+fUSD(Math.abs(d)); };
  const ordenados=R.ranked; // orden de prelación entre las ofertas adjudicables (dentro de presupuesto)
  // Un solo paquete de datos para ambas plantillas: cualquier tag documentado en
  // plantillas/TAGS.md funciona en cualquiera de las dos actas.
  const data={
    actaNo:S.actaNo||'001', objeto:S.objeto||'', area:S.area||'', modalidad:S.modalidad||'',
    presupuesto: S.presupuesto?fUSD(S.presupuesto):'—', presupuestoLetras: S.presupuesto?numeroALetras(S.presupuesto):'',
    partida:S.partida||'', lineaNombre:S.lineaNombre||'',
    fechaInvitacion:S.fechaInvitacion||'', fechaLimite:S.fechaLimiteOfertas||'',
    fechaSesion:S.fechaSesion||'____________', fechaAdj:S.fechaSesion||'', horaSesion:S.horaSesion||'__h__', lugarSesion:S.lugarSesion||'____________',
    memoNro:S.memoNro||'____________', fechaInicio:S.fechaInicio||'____________',
    umbral:fNum(num(S.umbralTecnico)), tecMax:fNum(tecMaxTotal()), puntosTotal:fNum(puntosTotales()), pesoEco:fNum(num(grupoEco().peso)),
    jefe:pres.nombre||'', ac:secr.nombre||'',
    comision: com.map(m=>({nombre:m.nombre||'(por designar)', cargo:m.cargo||'', rol:m.rol||''})),
    items: medios.map(m=>({miembros:m.nombre||'(por designar)', cargo:m.cargo||'', rol:m.rol||''})),
    provs: ofs.map(o=>({razon:o.nombre||'', fof:''})),
    monto1: ofs[0]?fUSD(ofs[0].precio):'', monto2: ofs[1]?fUSD(ofs[1].precio):'', monto3: ofs[2]?fUSD(ofs[2].precio):'',
    tecnicos: S.tipo==='puntos'
      ? ofs.map(o=>({razon:o.nombre||'', tecnico:fNum(o._tec), umbralRes:o._tecPass?'Pasa':'No pasa'}))
      : ofs.map(o=>({razon:o.nombre||'', resultado:o._tecPass?(o.descal?'RECHAZADA':'CALIFICA'):'NO CALIFICA',
          reqs:gateList().map(r=>({req:r.nombre, res:o.gates[r.id]===true?'Cumple':o.gates[r.id]===false?'No cumple':'—'}))})),
    economicos: cal.map(o=>({razon:o.nombre||'', sinIva:sinIva(o.precio), iva:ivaVal(o.precio), total:fUSD(o.precio),
      enPresupuesto:enPres(o), difPresupuesto:difPres(o),
      puntajeEco:S.tipo==='puntos'?fNum(o._eco):'—', puntajeTotal:S.tipo==='puntos'?(fNum(o._total)+' / '+fNum(puntosTotales())):'—'})),
    prelacion: ordenados.map((o,i)=>({orden:i+1, razon:o.nombre||'',
      tec:S.tipo==='puntos'?fNum(o._tec):'Cumple', eco:S.tipo==='puntos'?fNum(o._eco):'—',
      totalPts:S.tipo==='puntos'?fNum(o._total):fUSD(o.precio)})),
    proveedor: w?(w.nombre||''):'____________', proveedorRuc: w?(w.ruc||'____________'):'____________',
    montoTotal: w?fUSD(w.precio):'____________', montoLetras: w?numeroALetras(w.precio):''
  };
  const tpl = S.tipo==='puntos' ? 'plantillas/Acta_de_adjudicacion_puntos.docx' : 'plantillas/Acta_de_adjudicacion.docx';
  fetch(tpl,{cache:'no-cache'})
    .then(r=>{ if(!r.ok) throw new Error('fetch'); return r.arrayBuffer(); })
    .then(buf=>{
      const zip=new PizZip(buf);
      const doc=new DT(zip,{paragraphLoop:true, linebreaks:true, nullGetter:()=>''});
      doc.render(data);
      const out=doc.getZip().generate({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      const u=URL.createObjectURL(out); const a=document.createElement('a');
      a.href=u; a.download='Acta_'+(S.actaNo||'001')+'_'+(S.codigo||'proceso').replace(/[^\w-]+/g,'_')+'.docx'; a.click();
      setTimeout(()=>URL.revokeObjectURL(u),1500);
      toast('Acta Word generada');
    })
    .catch(()=>toast('No se pudo cargar la plantilla del acta (ábrelo en el sitio publicado, no como archivo local).'));
}

function toCSV(){
  const R=compute(); const rows=[];
  const H=['Orden','Oferente','RUC/CI','Precio'];
  if(S.tipo==='puntos'){ critList().forEach(c=>H.push(c.nombre)); H.push('Tecnico','Umbral','Economico','Total'); }
  else{ gateList().forEach(r=>H.push(r.nombre)); H.push('Legal','Tecnico','Estado'); }
  rows.push(H);
  const ordered=[...(S.oferentes||[])].sort((a,b)=>{ if(a._pasa!==b._pasa)return a._pasa?-1:1; return S.tipo==='cumple'?(num(a.precio)||1e15)-(num(b.precio)||1e15):b._total-a._total; });
  ordered.forEach(o=>{
    const row=[o._rank||'', o.nombre||'', o.ruc||'', num(o.precio)||''];
    if(S.tipo==='puntos'){ critList().forEach(c=>row.push(o.scores[c.id]==null?'':clamp(num(o.scores[c.id]),0,num(c.max)))); row.push(o._tec, o._pasa?'Pasa':'No pasa', o._pasa?o._eco:'', o._total); }
    else{ gateList().forEach(r=>row.push(o.gates[r.id]===true?'Cumple':o.gates[r.id]===false?'No cumple':'')); row.push(o._legalOk?'Cumple':'No', o._tecOk?'Cumple':'No', o._pasa?(R.winner&&o.id===R.winner.id?'Adjudicado':'Habilitado'):'Descalificado'); }
    rows.push(row);
  });
  return rows.map(r=>r.map(v=>{ const s=String(v==null?'':v); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(';')).join('\n');
}
