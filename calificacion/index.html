<script>
/* =========================================================================
   Calificador de Ofertas — FAP / FIAS
   Herramienta 100% del lado del cliente (sin backend, sin CDN de scripts).
   Cubre los dos esquemas de calificación que usa el FAP en sus convocatorias:
     A) POR PUNTOS  — consultorías y servicios: criterios técnicos ponderados
        + oferta económica inverso-proporcional, con umbral técnico mínimo.
     B) CUMPLE / NO CUMPLE — bienes/servicios con postcalificación: requisitos
        legales y técnicos habilitantes y adjudicación al menor precio.
   ========================================================================= */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = (p='id')=>p+Math.random().toString(36).slice(2,8);
const num = v => { const n = parseFloat(String(v==null?'':v).replace(/[^\d.,-]/g,'').replace(/\.(?=\d{3}\b)/g,'').replace(',','.')); return isFinite(n)?n:0; };
const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
const r2 = n => Math.round(n*100)/100;
const fUSD = n => '$'+(num(n)).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const fNum = n => (Math.round(n*100)/100).toLocaleString('es-EC',{maximumFractionDigits:2});
const todayEC = ()=> new Date().toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'});

/* Número a letras (dólares) para el acta: "CUARENTA MIL CON 00/100 DÓLARES…" */
function enteroALetras(n){
  const U=['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
  const D=['','','','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const C=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  if(n===0) return 'cero';
  const sec=x=>{ if(x===0)return''; if(x===100)return'cien'; let o=''; const c=Math.floor(x/100), r=x%100, d=Math.floor(r/10), u=r%10; if(c)o+=C[c]+' '; if(r<30)o+=U[r]; else{o+=D[d]; if(u)o+=' y '+U[u];} return o.trim(); };
  const apoc=s=>s.replace(/uno$/,'ún'); // "veintiún mil"
  let o='';
  const mill=Math.floor(n/1e6), miles=Math.floor((n%1e6)/1000), resto=n%1000;
  if(mill) o+=(mill===1?'un millón':apoc(sec(mill))+' millones')+' ';
  if(miles) o+=(miles===1?'mil':apoc(sec(miles))+' mil')+' ';
  if(resto) o+=sec(resto);
  return o.trim();
}
/* Devuelve "USD 10.000,00 (Diez mil con 00/100 dólares de los Estados Unidos de
   América)" — cifra + letras en el mismo formato que usan las bases del FAP (mayúscula
   solo en la primera palabra, no todo el texto en mayúsculas). */
function numeroALetras(v){
  const n=num(v), ent=Math.floor(n), cts=Math.round((n-ent)*100);
  const letras=enteroALetras(ent)+' con '+String(cts).padStart(2,'0')+'/100 dólares de los Estados Unidos de América';
  const sentence=letras.charAt(0).toUpperCase()+letras.slice(1);
  const cifra=n.toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
  return `USD ${cifra} (${sentence})`;
}

/* "Fuente de financiamiento / PAG": una sola fila del acta compuesta por la partida
   (PAG/subcuenta/componente) y la línea presupuestaria (código + nombre, igual que en
   La Mágica). Se reutiliza aquí, en la vista previa del formulario y en el Word. */
function lineaTexto(){ return [S.lineaCod, S.lineaNom].filter(Boolean).join(' '); }
function fuenteFinanciamientoTexto(){ return [S.partida, lineaTexto()].filter(Boolean).join(' - ') || '—'; }

function presetBienes(){

function emptyOf(S){ return {id:uid('of'),nombre:'',ruc:'',precio:'',fechaEntrega:'',horaEntrega:'',scores:{},gates:{},gatesDoc:{},obs:''}; }
/* miembros con voz y voto (los que califican por puntaje) */
const votantes = ()=> (S.comision||[]).filter(m=>m.voto);

/* --------------------------------- state --------------------------------- */
const LS='fap_calificador_v1';
let S = normalize(load());
function load(){ try{ const r=localStorage.getItem(LS); if(r) return JSON.parse(r); }catch(e){} return blankState('puntos'); }
function save(){ try{ localStorage.setItem(LS, JSON.stringify(S)); }catch(e){} }
/* Rellena campos nuevos en procesos guardados con versiones anteriores de la herramienta
   y migra la comisión de texto (una línea por miembro) a la estructura {nombre,cargo,rol}. */
function normalize(s){
  const d = blankState(s.tipo||'puntos');
  for(const k in d){ if(s[k]===undefined) s[k]=d[k]; }
  if(typeof s.comision==='string'){
    const roles=['Presidente/a de la Comisión','Miembro','Secretario/a'];
    const lines=s.comision.split('\n').map(x=>x.trim()).filter(Boolean);
    s.comision = (lines.length?lines:['','','']).map((l,i)=>({nombre:'', cargo:l, rol:roles[i]||'Miembro'}));
  }
  if(!Array.isArray(s.comision)||!s.comision.length) s.comision=d.comision;
  // migración: versiones anteriores guardaban "Línea / componente" como un solo texto
  // (p. ej. "2.2 Adquisición de motores y canoas"); se separa en código + nombre, igual
  // que en La Mágica (campo "Línea presupuestaria").
  if(s.lineaCod===undefined || s.lineaNom===undefined){
    const old=(s.lineaNombre||'').trim();
    const m=old.match(/^([\d.]+)\s+(.*)$/);
    s.lineaCod = s.lineaCod!==undefined?s.lineaCod:(m?m[1]:'');
    s.lineaNom = s.lineaNom!==undefined?s.lineaNom:(m?m[2]:old);
  }
  // miembros de comisión: asegurar id y bandera de voto (voz y voto)
  (s.comision||[]).forEach(m=>{
    if(!m.id) m.id=uid('m');
    if(m.voto===undefined) m.voto = !/secretar|invitad|voz sin/i.test(m.rol||'');
  });
  // consultoría por puntos: garantizar la matriz de documentos (Cumple/No cumple)
  if(s.tipo==='puntos' && !Array.isArray(s.reqDocs)) s.reqDocs = blankState('puntos').reqDocs;
  // scores por criterio: migrar de nota única {crit:valor} a nota por miembro {crit:{miembro:valor}}
  if(s.tipo==='puntos'){
    const primerVotante = (s.comision||[]).find(m=>m.voto);
    (s.oferentes||[]).forEach(o=>{
      if(!o.gatesDoc) o.gatesDoc={};
      o.scores = o.scores||{};
      for(const cid in o.scores){
        if(o.scores[cid]!==null && typeof o.scores[cid]!=='object'){
          const v=o.scores[cid];
          o.scores[cid] = primerVotante ? {[primerVotante.id]:v} : {};
        }
      }
    });
  }
  return s;
}

/* helpers over the model */
const gruposTecnicos = ()=> (S.grupos||[]).filter(g=>g.tipo==='tecnico');
const grupoEco = ()=> (S.grupos||[]).find(g=>g.tipo==='economico') || {peso:0,formula:S.tipo==='cumple'?'menor':'inverso',nombre:'Oferta económica'};
const critList  = ()=> gruposTecnicos().flatMap(g=>g.criterios.map(c=>({...c,grupo:g.nombre,gid:g.id})));
const gateList  = ()=> [...(S.reqLegales||[]).map(r=>({...r,fase:'legal'})), ...(S.reqTecnicos||[]).map(r=>({...r,fase:'tecnico'}))];
const reqDocList = ()=> (S.reqDocs||[]);
const tecMaxTotal = ()=> gruposTecnicos().reduce((a,g)=>a+g.criterios.reduce((x,c)=>x+num(c.max),0),0);
const puntosTotales = ()=> tecMaxTotal() + num(grupoEco().peso);
/* nota de un miembro en un criterio, acotada al máximo del criterio */
function notaMiembro(o,c,mid){ const cell=o.scores&&o.scores[c.id]; const v=cell&&cell[mid]; return (v===''||v==null)?null:clamp(num(v),0,num(c.max)); }
/* promedio de un criterio entre los miembros con voz y voto que sí calificaron */
function promedioCriterio(o,c){ const vs=votantes().map(m=>notaMiembro(o,c,m.id)).filter(v=>v!=null); return vs.length? vs.reduce((a,b)=>a+b,0)/vs.length : 0; }
/* total técnico de un miembro (suma de sus notas en todos los criterios) */
function tecnicoMiembro(o,mid){ return critList().reduce((a,c)=>{ const v=notaMiembro(o,c,mid); return a+(v==null?0:v); },0); }

/* --------------------------------- engine -------------------------------- */
function compute(){
  const ofs = S.oferentes||[];
  const eco = grupoEco();
  const pesoEco = num(eco.peso);
  const presup = num(S.presupuesto);
  ofs.forEach(o=>{
    o._tec=0; o._tecMax=tecMaxTotal(); o._eco=0; o._total=0; o._pasa=false; o._rank=null; o._motivo='';
    const p=num(o.precio);
    // 1) evaluación técnica / requisitos
    let tecOk=true;
    if(S.tipo==='puntos'){
      // gate de documentos (Cumple/No cumple): todos los formularios deben cumplir
      o._docOk = reqDocList().every(r=>(o.gatesDoc||{})[r.id]===true);
      // puntaje técnico = suma de los PROMEDIOS por criterio (entre miembros con voz y voto)
      let t=0; critList().forEach(c=>{ t += promedioCriterio(o,c); });
      o._tec=r2(t);
      tecOk = o._docOk && o._tec >= num(S.umbralTecnico);
    }else{
      o._legalOk = (S.reqLegales||[]).every(r=>o.gates[r.id]===true);
      o._tecOk   = (S.reqTecnicos||[]).every(r=>o.gates[r.id]===true);
      tecOk = o._legalOk && o._tecOk;
    }
    o._tecPass = tecOk;  // superó la evaluación técnica / requisitos (independiente del precio)
    // 2) ¿supera el presupuesto referencial? (solo si hay presupuesto y precio)
    o._sobrepasa = presup>0 && p>0 && p>presup;
    // 3) causa por la que NO pasa (en orden de prelación de motivos)
    if(o.descal)            o._motivo = (o.descalMotivo||'').trim() || 'Rechazada por decisión de la Comisión';
    else if(!tecOk)         o._motivo = S.tipo==='puntos' ? (!o._docOk ? 'No cumple la entrega de documentos' : 'No alcanza el umbral técnico (75)')
                                        : (!o._legalOk ? 'No cumple requisitos legales' : 'No cumple requisitos técnicos');
    else if(o._sobrepasa)   o._motivo = 'Supera el presupuesto referencial';
    o._pasa = !o.descal && tecOk && !o._sobrepasa;
  });
  // económico: solo entre quienes pasan y tienen precio válido
  const validos = ofs.filter(o=>o._pasa && num(o.precio)>0);
  const pmin = validos.length ? Math.min(...validos.map(o=>num(o.precio))) : 0;
  ofs.forEach(o=>{
    const p=num(o.precio);
    if(o._pasa && p>0 && pmin>0){
      o._eco = r2((S.tipo==='cumple'?100:pesoEco) * (pmin/p));
    }
    o._total = S.tipo==='puntos' ? r2(o._tec + (o._pasa?o._eco:0)) : (o._pasa?o._eco:0);
  });
  // "Propuesta única presentada": si se recibió una sola oferta, las bases exigen que la
  // Comisión se pronuncie EXPRESAMENTE sobre su conveniencia institucional antes de
  // adjudicar — no es automático aunque la oferta cumpla todo. Mientras no haya decisión
  // (unicaOk === null/undefined), esa oferta no cuenta como ganadora.
  const entradas = ofs.filter(o=>o.nombre.trim()||o.precio);
  const esUnica = entradas.length===1;
  const unico = esUnica ? entradas[0] : null;
  let unicoPendiente=false, unicoRechazadaPorConveniencia=false;
  if(unico && unico._pasa){
    if(unico.unicaOk===true){ /* confirmada: sigue en la carrera normalmente */ }
    else if(unico.unicaOk===false){ unico._pasa=false; unico._motivo='Oferta única declarada no conveniente para los intereses institucionales'; unicoRechazadaPorConveniencia=true; }
    else { unico._pasa=false; unico._motivo='Oferta única — pendiente de pronunciamiento de la Comisión'; unicoPendiente=true; }
  }
  const passers = ofs.filter(o=>o._pasa);
  const ranked = [...passers].sort((a,b)=> S.tipo==='cumple' ? num(a.precio)-num(b.precio) : b._total-a._total);
  ranked.forEach((o,i)=>o._rank=i+1);
  return { pmin, pesoEco, winner:ranked[0]||null, ranked, nPass:passers.length, nTot:ofs.length, presup,
    esUnica, unico, unicoPendiente, unicoRechazadaPorConveniencia };
}

/* --------------------------------- render -------------------------------- */
function render(){
  const app=$("#app");
  compute(); // efecto: fija _tec/_tecPass/_pasa en cada oferente antes de dibujar Sobre 1 / Sobre 2
  app.innerHTML = viewProceso() + viewMatrizConfig() + viewOferentes() + `<div id="resultados"></div><div id="acta" style="margin-top:16px"></div>` + viewBasesSection();
  bindProceso(); bindConfig(); bindOferentes(); bindBases();
  renderResultados();
  save();
}

    const keep = {oferentes:S.oferentes};
    S = Object.assign(blankState(b.dataset.t), keep);
    render();
  });
  const bindF=(id,key)=>{ const el=$(id); if(el) el.oninput=()=>{ S[key]=el.value; const lp=$("#lineaPreview"); if(lp) lp.innerHTML=`Así aparece en el acta, fila «Fuente de financiamiento / PAG»: <b>${esc(fuenteFinanciamientoTexto())}</b>`; renderResultados(); save(); }; };
  ['objeto','codigo','tipoProceso','entidad','presupuesto','lugar','actaNo','modalidad','area',
   'partida','lineaCod','lineaNom','fechaInvitacion','fechaLimiteOfertas','fechaSesion','horaSesion',
   'lugarSesion','memoNro','fechaInicio','ivaPct'].forEach(k=>bindF('#f_'+k,k));
  const u=$('#f_umbral'); if(u) u.oninput=()=>{ S.umbralTecnico=num(u.value); renderResultados(); save(); };
  // comisión (estructurada)
  const cm=i=>S.comision[i];
  $$(".cmNombre").forEach(el=>el.oninput=()=>{ const m=cm(+el.dataset.ci); if(m){m.nombre=el.value; renderResultados(); save();} });
  $$(".cmCargo").forEach(el=>el.oninput=()=>{ const m=cm(+el.dataset.ci); if(m){m.cargo=el.value; renderResultados(); save();} });
  $$(".cmRol").forEach(el=>el.oninput=()=>{ const m=cm(+el.dataset.ci); if(m){m.rol=el.value; renderResultados(); save();} });
  $$(".cmVoto").forEach(el=>el.onchange=()=>{ const m=cm(+el.dataset.ci); if(m){ m.voto=el.checked; render(); } });
  $$(".cmDel").forEach(el=>el.onclick=()=>{ S.comision.splice(+el.dataset.ci,1); render(); });
  const ca=$("#cmAdd"); if(ca) ca.onclick=()=>{ S.comision.push({id:uid('m'),nombre:'',cargo:'',rol:'Miembro',voto:true}); render(); };
}

/* ---- panel 2: matriz de evaluación (config) ---- */

function viewGrupoTec(g){

      <span class="grp-sum">${fNum(sum)} pts</span>
      <button class="btn ghost xs delGrupo" data-g="${g.id}" title="Eliminar grupo">✕</button>
    </div>
    ${g.criterios.map(c=>`
      <div class="crit-row">
        <input class="in critname grow" data-g="${g.id}" data-c="${c.id}" value="${esc(c.nombre)}" placeholder="Criterio de evaluación">
        <input class="in critmax max" data-g="${g.id}" data-c="${c.id}" value="${esc(c.max)}" inputmode="decimal" title="Puntos máximos">
        <button class="btn ghost xs delCrit" data-g="${g.id}" data-c="${c.id}" title="Eliminar criterio">✕</button>
      </div>`).join('')}
    <button class="btn line xs addCrit" data-g="${g.id}" style="margin-top:9px">+ Criterio</button>
  </div>`;
}
function viewGrupoEco(){
  const g=grupoEco();
  return `
  <div class="grp-box" style="background:#F4FAFF;border-color:#D6E7F5">
    <div class="grp-head">
      <div class="gt">${icoCoin()} Oferta económica <span style="color:var(--muted);font-weight:600">· inverso-proporcional</span></div>

}
function viewReqBox(titulo, arr, fase){
  return `
  <div class="grp-box" data-fase="${fase}">
    <div class="grp-head"><div class="gt">${fase==='legal'?icoDoc():icoWrench()} ${esc(titulo)}</div><span class="grp-sum">${arr.length} req.</span></div>

      <div class="crit-row">

function bindConfig(){
  // grupos técnicos
  $$(".gname").forEach(el=>el.onchange=()=>{ const g=S.grupos.find(x=>x.id===el.dataset.g); if(g){g.nombre=el.value; render();} });
  $$(".critname").forEach(el=>el.onchange=()=>{ const g=S.grupos.find(x=>x.id===el.dataset.g); const c=g&&g.criterios.find(x=>x.id===el.dataset.c); if(c){c.nombre=el.value; render();} });
  $$(".critmax").forEach(el=>el.onchange=()=>{ const g=S.grupos.find(x=>x.id===el.dataset.g); const c=g&&g.criterios.find(x=>x.id===el.dataset.c); if(c){c.max=num(el.value); render();} });
  $$(".addCrit").forEach(el=>el.onclick=()=>{ const g=S.grupos.find(x=>x.id===el.dataset.g); if(g){g.criterios.push({id:uid('c'),nombre:'',max:10}); render();} });
  $$(".delCrit").forEach(el=>el.onclick=()=>{ const g=S.grupos.find(x=>x.id===el.dataset.g); if(g){g.criterios=g.criterios.filter(c=>c.id!==el.dataset.c); render();} });
  $$(".delGrupo").forEach(el=>el.onclick=()=>{ if(gruposTecnicos().length<=1){toast('Debe existir al menos un grupo técnico');return;} S.grupos=S.grupos.filter(g=>g.id!==el.dataset.g); render(); });
  const ag=$("#addGrupo"); if(ag) ag.onclick=()=>{ const eco=S.grupos.filter(g=>g.tipo==='economico'); const tec=gruposTecnicos(); S.grupos=[...tec,{id:uid('g'),tipo:'tecnico',nombre:'Nuevo grupo',criterios:[{id:uid('c'),nombre:'',max:10}]},...eco]; render(); };
  const ep=$("#ecoPeso"); if(ep) ep.onchange=()=>{ grupoEco().peso=num(ep.value); render(); };
  // requisitos (cumple)
  $$(".reqname").forEach(el=>el.onchange=()=>{ const arr = el.dataset.fase==='legal'?S.reqLegales:S.reqTecnicos; const r=arr.find(x=>x.id===el.dataset.r); if(r){r.nombre=el.value; render();} });
  $$(".addReq").forEach(el=>el.onclick=()=>{ const k=el.dataset.fase==='legal'?'reqLegales':'reqTecnicos'; S[k]=[...(S[k]||[]),{id:uid(el.dataset.fase[0]),nombre:''}]; render(); });
  $$(".delReq").forEach(el=>el.onclick=()=>{ const k=el.dataset.fase==='legal'?'reqLegales':'reqTecnicos'; S[k]=(S[k]||[]).filter(r=>r.id!==el.dataset.r); render(); });
}

/* ---- panel 3: oferentes (matriz de calificación) ---- */
function viewOferentes(){

  const sobre1 = S.tipo==='puntos'

        <div class="psub">${S.tipo==='puntos'

      </div>

    <div id="sobre2wrap">${ofs.length? `<div class="tablewrap">${matrizEconomica()}</div>` : `<div class="empty">Agrega oferentes en el Sobre 1 para registrar aquí sus precios.</div>`}</div>

/* Sobre 1 · consultoría — matriz Cumple/No cumple de entrega de documentos (formularios) */
function matrizDocs(){
  const D=reqDocList();
  let h='<table class="mx"><thead><tr><th style="text-align:left">Oferente</th>';
  D.forEach(r=>{ h+=`<th class="cn">${esc(r.nombre.length>40?r.nombre.slice(0,38)+'…':r.nombre)}</th>`; });
  h+='<th>Documentos</th><th></th></tr></thead><tbody>';
  S.oferentes.forEach(o=>{
    h+=`<tr class="${o.descal?'rechRow':''}">${ofNameCell(o)}`;
    D.forEach(r=>{ const v=(o.gatesDoc||{})[r.id]; const cls=v===true?'si':v===false?'no':'';
      h+=`<td><select class="cn-sel docIn ${cls}" data-of="${o.id}" data-r="${r.id}"><option value="">—</option><option value="1" ${v===true?'selected':''}>Cumple</option><option value="0" ${v===false?'selected':''}>No</option></select></td>`;
    });
    h+=`<td id="doc1-${o.id}" style="text-align:center;white-space:nowrap">${o._docOk?'<span class="badge b-g">Cumple</span>':(o.nombre?'<span class="badge b-r">Incompleto</span>':'<span class="badge b-d">—</span>')}</td>`;
    h+=ofActions(o)+'</tr>';
  });
  h+='</tbody></table>';
  return h;
}
/* Encabezado (nombre · RUC) del bloque de puntaje; se refresca en vivo en refreshSobres */
function ofHdrInner(o){
  return `${esc(o.nombre||'(oferente sin nombre)')}${o.ruc?` <span style="color:var(--muted);font-weight:600">· ${esc(o.ruc)}</span>`:''}`;
}
/* Sobre 1 · consultoría — puntaje por miembro con voz y voto + promedio (por oferente) */
function puntajeOferente(o){
  const V=votantes(), crit=critList();
  let h=`<div class="grp-box" style="padding:0;overflow:hidden;margin-bottom:14px;${o.descal?'opacity:.55':''}">
    <div class="grp-head" style="padding:11px 14px;margin:0;background:#FCFDFF;border-bottom:1px solid var(--line2)">
      <div class="gt" style="flex:1" id="ofhdr-${o.id}">${ofHdrInner(o)}</div>
      <span id="est1-${o.id}">${estadoSobre1Inner(o)}</span>
      <span style="margin-left:8px">${ofActionsInline(o)}</span>
    </div>
    <div class="tablewrap" style="border:0;border-radius:0">
    <table class="mx"><thead><tr><th style="text-align:left;min-width:220px">Criterio</th><th>Puntaje TDR</th>`;
  V.forEach(m=>{ h+=`<th class="cn">${esc((m.nombre||'Miembro').split(' ').slice(0,2).join(' '))}</th>`; });
  h+='<th>Promedio</th></tr></thead><tbody>';
  crit.forEach(c=>{
    h+=`<tr><td style="text-align:left">${esc(c.nombre.length>70?c.nombre.slice(0,68)+'…':c.nombre)}</td><td class="num" style="text-align:center">${fNum(num(c.max))}</td>`;
    V.forEach(m=>{ const v=(o.scores[c.id]||{})[m.id]; const over=num(v)>num(c.max);
      h+=`<td class="cell"><input class="scoreIn ${over?'over':''}" data-of="${o.id}" data-c="${c.id}" data-m="${m.id}" value="${v==null||v===''?'':esc(v)}" inputmode="decimal" title="máx ${fNum(num(c.max))}" style="width:52px"></td>`;
    });
    h+=`<td class="num" id="prom-${o.id}-${c.id}" style="text-align:center;font-weight:700;color:var(--navy)">${fNum(promedioCriterio(o,c))}</td></tr>`;
  });
  // fila total
  h+=`<tr style="background:#FAFBFE"><th style="text-align:left">Total técnico</th><th class="num" style="text-align:center">${fNum(tecMaxTotal())}</th>`;
  V.forEach(m=>{ h+=`<th class="num" id="mtot-${o.id}-${m.id}" style="text-align:center">${fNum(tecnicoMiembro(o,m.id))}</th>`; });
  h+=`<th class="num" id="tectot-${o.id}" style="text-align:center;color:var(--navy)">${fNum(o._tec||0)}</th></tr>`;
  h+='</tbody></table></div></div>';
  return h;
}
/* acciones (rechazar/eliminar) en versión compacta para el encabezado del bloque de puntaje */
function ofActionsInline(o){
  return `<button class="btn ghost xs rechOf" data-of="${o.id}" title="${o.descal?'Habilitar':'Rechazar / descalificar'}" style="color:${o.descal?'var(--green)':'var(--red)'};font-size:14px">${o.descal?'↺':'⊘'}</button><button class="btn ghost xs delOf" data-of="${o.id}" title="Eliminar oferente">✕</button>`;
}
/* Celdas compartidas por las dos matrices */
function overPresup(o){ const p=num(o.precio), pr=num(S.presupuesto); return pr>0 && p>0 && p>pr; }
function ofNameCell(o){
  return `<td class="of">
    <input class="in ofn" data-of="${o.id}" data-k="nombre" value="${esc(o.nombre)}" placeholder="Razón social / nombre">
    <input class="in ofr" data-of="${o.id}" data-k="ruc" value="${esc(o.ruc)}" placeholder="RUC / cédula" style="font-size:12px">
    <div style="display:flex;gap:4px;margin-top:3px">
      <input class="in off" data-of="${o.id}" data-k="fechaEntrega" value="${esc(o.fechaEntrega)}" placeholder="Fecha de entrega (opcional)" style="font-size:11.5px;color:var(--muted)" title="Va en el acta, columna «Fecha de entrega» (tag {fof})">
      <input class="in ofh" data-of="${o.id}" data-k="horaEntrega" value="${esc(o.horaEntrega)}" placeholder="Hora" style="font-size:11.5px;color:var(--muted);max-width:70px" title="Va en el acta, columna «Hora» (tag {hof})">
    </div>
    ${o.descal?`<div class="miniof" style="color:var(--red);font-weight:700">⊘ Rechazada por la Comisión</div>`:''}</td>`;
}
function priceCell(o){
  return `<td class="pricec"><input class="priceIn ${overPresup(o)?'over':''}" data-of="${o.id}" value="${esc(o.precio)}" inputmode="decimal" placeholder="0.00" title="${overPresup(o)?'Supera el presupuesto referencial ('+fUSD(S.presupuesto)+')':''}">${overPresup(o)?'<div class="miniof" style="color:var(--red);font-weight:700;text-align:right">↑ sobre presupuesto</div>':''}</td>`;
}
function ofActions(o){
  return `<td style="white-space:nowrap">
    <button class="btn ghost xs rechOf" data-of="${o.id}" title="${o.descal?'Habilitar esta oferta':'Rechazar / descalificar esta oferta (decisión de la Comisión)'}" style="color:${o.descal?'var(--green)':'var(--red)'};font-size:14px">${o.descal?'↺':'⊘'}</button>
    <button class="btn ghost xs delOf" data-of="${o.id}" title="Eliminar oferente">✕</button>
  </td>`;
}
/* Contenido de la columna "Estado" del Sobre 1 (se recalcula en vivo con refreshSobres). */
function estadoSobre1Inner(o){
  const tiene = o.nombre||o.precio;
  if(o.descal) return '<span class="badge b-r">Rechazada</span>';
  if(S.tipo==='puntos'){
    const detalle = o._tecPass ? ' <span class="badge b-g">Pasa (≥75)</span>'
      : (tiene ? ` <span class="badge b-r">No pasa</span>${!o._docOk?' <span class="miniof" style="color:var(--red);font-weight:700">docs incompletos</span>':''}` : '');
    return `Promedio <b>${fNum(o._tec||0)}</b> / ${fNum(tecMaxTotal())}${detalle}`;
  }
  return o._tecPass?'<span class="badge b-g">Cumple todo</span>':(tiene?'<span class="badge b-r">No cumple</span>':'<span class="badge b-d">—</span>');
}
function matrizCumple(){
  const L=S.reqLegales||[], T=S.reqTecnicos||[];
  let h='<table class="mx"><thead><tr><th rowspan="2" style="text-align:left">Oferente</th>';
  if(L.length) h+=`<th class="grp" colspan="${L.length}">Requisitos legales</th>`;
  if(T.length) h+=`<th class="grp" colspan="${T.length}">Requisitos técnicos</th>`;
  h+=`<th rowspan="2">Estado</th><th rowspan="2"></th></tr><tr>`;
  [...L,...T].forEach(r=>{ h+=`<th class="cn">${esc(r.nombre.length>40?r.nombre.slice(0,38)+'…':r.nombre)}</th>`; });
  h+='</tr></thead><tbody>';
  S.oferentes.forEach(o=>{
    h+=`<tr class="${o.descal?'rechRow':''}">${ofNameCell(o)}`;
    [...L,...T].forEach(r=>{
      const v=o.gates[r.id]; const cls=v===true?'si':v===false?'no':'';
      h+=`<td><select class="cn-sel gateIn ${cls}" data-of="${o.id}" data-r="${r.id}"><option value="">—</option><option value="1" ${v===true?'selected':''}>Cumple</option><option value="0" ${v===false?'selected':''}>No</option></select></td>`;
    });
    h+=`<td id="est1-${o.id}" style="text-align:center;white-space:nowrap">${estadoSobre1Inner(o)}</td>`;
    h+=ofActions(o)+'</tr>';
  });
  h+='</tbody></table>';
  return h;
}
/* Sobre 2: solo aquí se ve y se registra el precio. Refleja la regla de las bases —
   la oferta económica de quien no supera el Sobre 1 se devuelve sin abrir. */
function matrizEconomica(){
  const ofs=S.oferentes||[];
  let h='<table class="mx"><thead><tr><th style="text-align:left">Oferente</th><th>Estado técnico (Sobre 1)</th><th>Precio<br>(USD)</th></tr></thead><tbody>';
  ofs.forEach(o=>{
    const abre = o._tecPass && !o.descal;
    h+=`<tr class="${o.descal?'rechRow':''}">`;
    h+=`<td class="of" style="text-align:left"><b>${esc(o.nombre||'(sin nombre)')}</b>${o.ruc?`<div class="miniof">${esc(o.ruc)}</div>`:''}</td>`;
    h+=`<td style="text-align:center;white-space:nowrap">${
      o.descal?'<span class="badge b-r">Rechazada</span>'
      : S.tipo==='puntos' ? `${fNum(o._tec||0)} / ${fNum(tecMaxTotal())} ${o._tecPass?'<span class="badge b-g">Pasa</span>':'<span class="badge b-r">No pasa</span>'}`
      : (o._tecPass?'<span class="badge b-g">Cumple todo</span>':'<span class="badge b-r">No cumple</span>')
    }</td>`;
    h+= abre ? priceCell(o) : `<td class="pricec"><span class="miniof" style="font-style:italic">Sobre cerrado — no se abre${o.descal?' (rechazada)':''}</span></td>`;
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}
/* Actualiza EN VIVO la columna "Estado" del Sobre 1 y todo el Sobre 2 (badge técnico y
   apertura del sobre económico) tras cambiar un Cumple/No cumple o un puntaje. Se llama
   desde los handlers del Sobre 1 (los inputs con foco están en el Sobre 1, así que
   re-renderizar el Sobre 2 no pierde lo que se está escribiendo). */
function refreshSobres(){
  compute();
  (S.oferentes||[]).forEach(o=>{
    const c=$("#est1-"+o.id); if(c) c.innerHTML=estadoSobre1Inner(o);
    if(S.tipo==='puntos'){
      const hd=$("#ofhdr-"+o.id); if(hd) hd.innerHTML=ofHdrInner(o);
      const d=$("#doc1-"+o.id); if(d) d.innerHTML = o._docOk?'<span class="badge b-g">Cumple</span>':(o.nombre?'<span class="badge b-r">Incompleto</span>':'<span class="badge b-d">—</span>');
      critList().forEach(cr=>{ const pc=$("#prom-"+o.id+"-"+cr.id); if(pc) pc.textContent=fNum(promedioCriterio(o,cr)); });
      votantes().forEach(m=>{ const mc=$("#mtot-"+o.id+"-"+m.id); if(mc) mc.textContent=fNum(tecnicoMiembro(o,m.id)); });
      const tt=$("#tectot-"+o.id); if(tt) tt.textContent=fNum(o._tec||0);
    }
  });
  const s2=$("#sobre2wrap");
  if(s2){
    s2.innerHTML = (S.oferentes||[]).length ? `<div class="tablewrap">${matrizEconomica()}</div>` : `<div class="empty">Agrega oferentes en el Sobre 1 para registrar aquí sus precios.</div>`;
    bindSobre2();
  }
  renderResultados();
}
function bindSobre2(){
  const of=id=>S.oferentes.find(o=>o.id===id);
  $$("#sobre2wrap .priceIn").forEach(el=>el.oninput=()=>{ const o=of(el.dataset.of); if(o){o.precio=el.value; const pr=num(S.presupuesto); el.classList.toggle('over', pr>0 && num(el.value)>pr); renderResultados(); save();} });
}
function bindOferentes(){
  const add=$("#addOf"); if(add) add.onclick=()=>{ S.oferentes.push(emptyOf(S)); render(); };
  $$(".delOf").forEach(el=>el.onclick=()=>{ S.oferentes=S.oferentes.filter(o=>o.id!==el.dataset.of); render(); });
  const of=id=>S.oferentes.find(o=>o.id===id);
  $$(".ofn,.ofr,.off,.ofh").forEach(el=>el.oninput=()=>{ const o=of(el.dataset.of); if(o){o[el.dataset.k]=el.value; refreshSobres(); save();} });
  $$(".scoreIn").forEach(el=>el.oninput=()=>{ const o=of(el.dataset.of); if(o){ const cid=el.dataset.c, mid=el.dataset.m; if(!o.scores[cid]||typeof o.scores[cid]!=='object') o.scores[cid]={}; o.scores[cid][mid]=el.value; const c=critList().find(x=>x.id===cid); el.classList.toggle('over', c && num(el.value)>num(c.max)); refreshSobres(); save(); } });
  bindSobre2();
  $$(".gateIn").forEach(el=>el.onchange=()=>{ const o=of(el.dataset.of); if(o){ o.gates[el.dataset.r]= el.value===''?null:(el.value==='1'); el.className='cn-sel gateIn '+(el.value==='1'?'si':el.value==='0'?'no':''); refreshSobres(); save(); } });
  $$(".docIn").forEach(el=>el.onchange=()=>{ const o=of(el.dataset.of); if(o){ if(!o.gatesDoc)o.gatesDoc={}; o.gatesDoc[el.dataset.r]= el.value===''?null:(el.value==='1'); el.className='cn-sel docIn '+(el.value==='1'?'si':el.value==='0'?'no':''); refreshSobres(); save(); } });
  $$(".rechOf").forEach(el=>el.onclick=()=>{ const o=of(el.dataset.of); if(!o) return;
    if(!o.descal){ const m=prompt('Motivo del rechazo / descalificación (opcional):', o.descalMotivo||''); o.descal=true; o.descalMotivo=(m||'').trim(); }
    else { o.descal=false; o.descalMotivo=''; }
    render();
  });
}

    <div class="winner" style="background:var(--amberbg);border-color:#E9D2A0">
      <div class="medal" style="background:var(--amber)">${icoWrench()}</div>
      <div style="flex:1;min-width:0">

        <div class="ws">Se recibió una sola oferta y cumple los requisitos (${S.tipo==='puntos'?`puntaje técnico ${fNum(u._tec)}`:'legal y técnico'})${u.precio?`, precio ${fUSD(u.precio)}`:''}. Según las bases, la Comisión debe pronunciarse expresamente sobre si es <b>conveniente a los intereses institucionales</b> antes de adjudicar.</div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn sm" id="unicaSi" style="background:var(--green)">✓ Es conveniente — adjudicar</button>

        </div>
      </div>

    <div class="winner" style="background:var(--redbg);border-color:#E6BFBF">
      <div class="medal" style="background:var(--red)">!</div>
      <div style="flex:1;min-width:0">
        <div class="wt" style="color:var(--red)">Propuesta única declarada no conveniente</div>
        <div class="ws">${esc(u.nombre||'')} cumplía los requisitos, pero la Comisión determinó que no conviene a los intereses institucionales. Se recomienda declarar desierto.
          <button class="btn ghost xs" id="unicaReabrir" style="margin-left:8px">↺ Revisar decisión</button></div>
      </div>
    </div>`;
  }
  if(R.winner){
    const w=R.winner;
    winnerBanner=`
    <div class="winner">
      <div class="medal">${icoTrophy()}</div>
      <div style="flex:1;min-width:0">
        <div class="wt">Oferta recomendada para adjudicación</div>
        <div class="wn">${esc(w.nombre||'(sin nombre)')}</div>
        <div class="ws">${S.tipo==='puntos'
          ? `Puntaje total <b>${fNum(w._total)} / ${fNum(puntosTotales())}</b> — Técnico ${fNum(w._tec)} + Económico ${fNum(w._eco)}`
          : `Cumple todos los requisitos · <b>menor precio</b>`} · Precio <b>${esc(numeroALetras(w.precio))}</b>${R.esUnica?' · <span style="color:var(--green)">propuesta única confirmada como conveniente</span>':''}</div>
      </div>
    </div>`;
  } else if(conNombre.length && !unicaPanel){
    winnerBanner=`
    <div class="winner" style="background:var(--redbg);border-color:#E6BFBF">
      <div class="medal" style="background:var(--red)">!</div>
      <div style="flex:1;min-width:0">
        <div class="wt" style="color:var(--red)">Sin oferta adjudicable — se recomienda declarar desierto</div>
        <div class="ws">Ninguna oferta reúne las condiciones para ser adjudicada. Revisa los motivos en la tabla${nSobre?' (hay ofertas que superan el presupuesto)':''}.</div>
      </div>
    </div>`;
  }
  const avisoPres = nSobre ? `<div class="hint" style="margin-top:0;margin-bottom:14px;background:var(--redbg);border-color:#E6BFBF;color:#8A2A2A">
      <b>${nSobre} oferta(s) superan el presupuesto referencial</b> de ${fUSD(S.presupuesto)} y por eso <b>no se recomiendan para adjudicación</b>. Si el valor es correcto y el presupuesto no, corrígelo arriba; si un oferente debe rechazarse por otra causa, usa el botón <b>⊘ Rechazar</b>.</div>` : '';
  box.innerHTML=`
  <div class="panel no-print">
    <div class="phead">
      <div class="n">4</div>
      <div class="grow"><div class="ptitle">Resultados de la calificación</div>
      <div class="psub">${R.nPass} de ${R.nTot} oferente(s) ${S.tipo==='puntos'?`superan el umbral de ${fNum(num(S.umbralTecnico))} pts`:'cumplen todos los requisitos'}${R.presup?` y no superan el presupuesto (${fUSD(S.presupuesto)})`:''}. ${R.pmin?`Precio más bajo (válido): ${fUSD(R.pmin)}.`:''} La herramienta <b>recomienda</b> según la regla de las bases; la Comisión decide (puede rechazar con causa o declarar desierto en el acta).</div></div>
    </div>
    ${avisoPres}

  const usi=$("#unicaSi"), uno=$("#unicaNo"), ureab=$("#unicaReabrir");
  if(usi) usi.onclick=()=>{ R.unico.unicaOk=true; render(); };
  if(uno) uno.onclick=()=>{ R.unico.unicaOk=false; render(); };
  if(ureab) ureab.onclick=()=>{ R.unico.unicaOk=null; render(); };
  renderActa(R);
}
function tablaResultados(R){
  const ofs=S.oferentes||[];
  const ordered=[...ofs].sort((a,b)=>{
    if(a._pasa!==b._pasa) return a._pasa?-1:1;
    return S.tipo==='cumple' ? (num(a.precio)||1e15)-(num(b.precio)||1e15) : b._total-a._total;
  });
  const totMax=puntosTotales();
  let h='<div class="tablewrap"><table class="rz"><thead><tr><th>#</th><th>Oferente</th>';
  if(S.tipo==='puntos') h+=`<th>Técnico</th><th>Umbral</th><th>Económico</th><th>Total</th><th style="width:130px">Ranking</th>`;
  else h+=`<th>Legal</th><th>Técnico</th><th>Estado</th>`;
  h+='<th class="num">Precio</th></tr></thead><tbody>';
  ordered.forEach(o=>{
    const win = R.winner && o.id===R.winner.id;
    const cls = win?'win':(!o._pasa?'out':'');
    h+=`<tr class="${cls}"><td>${o._rank?`<span class="rankpill ${o._rank===1?'one':''}">${o._rank}</span>`:'—'}</td>`;
    h+=`<td><b>${esc(o.nombre||'(sin nombre)')}</b>${o.ruc?`<div class="miniof">RUC/CI: ${esc(o.ruc)}</div>`:''}</td>`;
    const motivoTag = o._pasa ? '' : `<div class="miniof" style="color:var(--red)">${esc(o._motivo||'No pasa')}</div>`;
    if(S.tipo==='puntos'){
      const pct = totMax? clamp(o._total/totMax*100,0,100):0;
      h+=`<td class="num">${fNum(o._tec)} / ${fNum(o._tecMax)}</td>`;
      h+=`<td>${o._pasa?'<span class="badge b-g">Pasa</span>':`<span class="badge b-r">No pasa</span>${motivoTag}`}</td>`;
      h+=`<td class="num">${o._pasa?fNum(o._eco):'—'}</td>`;
      h+=`<td class="num"><b>${fNum(o._total)}</b><div class="bar" style="margin-top:5px"><i style="width:${pct}%;background:${win?'var(--green)':'var(--navy)'}"></i></div></td>`;
    }else{
      h+=`<td>${o._legalOk?'<span class="badge b-g">Cumple</span>':'<span class="badge b-r">No</span>'}</td>`;
      h+=`<td>${o._tecOk?'<span class="badge b-g">Cumple</span>':'<span class="badge b-r">No</span>'}</td>`;
      h+=`<td>${o._pasa?(win?'<span class="badge b-g">Adjudicado</span>':'<span class="badge b-n">Habilitado</span>'):`<span class="badge b-r">Descalificado</span>${motivoTag}`}</td>`;
    }
    h+=`<td class="num">${o.precio?fUSD(o.precio):'—'}${o._sobrepasa&&!o.descal?'<div class="miniof" style="color:var(--red)">↑ sobre presupuesto</div>':''}</td></tr>`;
  });
  h+='</tbody></table></div>';
  return h;
}

/* Tabla de evaluación técnica por puntaje del acta (formato FO-AD-ABC-009):
   criterios × miembros con voz y voto + Promedio. Con incluirEco añade la fila de
   oferta económica y la fila Total sobre 100. */
function actaTecnicaTable(o, incluirEco){
  const V=votantes(), crit=critList(), ecoV=fNum(o._eco||0);
  let h=`<table><thead><tr><th>Criterios</th><th class="n">Puntaje TDR</th>${V.map(m=>`<th class="n">${esc(m.nombre||'Miembro')}</th>`).join('')}<th class="n">Promedio</th></tr></thead><tbody>`;
  crit.forEach(c=>{
    h+=`<tr><td>${esc(c.nombre)}</td><td class="n">${fNum(num(c.max))}</td>${V.map(m=>{const v=notaMiembro(o,c,m.id);return `<td class="n">${v==null?'—':fNum(v)}</td>`;}).join('')}<td class="n"><b>${fNum(promedioCriterio(o,c))}</b></td></tr>`;
  });
  if(incluirEco) h+=`<tr><td>Oferta económica</td><td class="n">${fNum(num(grupoEco().peso))}</td>${V.map(()=>`<td class="n">${ecoV}</td>`).join('')}<td class="n"><b>${ecoV}</b></td></tr>`;
  const totMax=incluirEco?fNum(puntosTotales()):fNum(tecMaxTotal());
  const totProm=incluirEco?fNum(o._total||0):fNum(o._tec||0);
  h+=`<tr><th>Total</th><th class="n">${totMax}</th>${V.map(m=>{const t=tecnicoMiembro(o,m.id)+(incluirEco?num(o._eco):0);return `<th class="n">${fNum(t)}</th>`;}).join('')}<th class="n">${totProm}</th></tr>`;
  h+='</tbody></table>';
  return h;
}
/* Matriz Cumple/No cumple de entrega de documentos (formularios) para el acta */
function actaDocMatrix(ofs){
  const D=reqDocList(); if(!D.length) return '';
  let h=`<table><thead><tr><th>Formularios</th><th>Detalle</th>${ofs.map(o=>`<th class="n">${esc((o.nombre||'Oferente').slice(0,22))}</th>`).join('')}<th>Observaciones</th></tr></thead><tbody>`;
  D.forEach((r,i)=>{
    const det=r.nombre.replace(/^Formulario\s*\d+\s*[—-]\s*/,'');
    h+=`<tr><td>Formulario ${i+1}</td><td>${esc(det)}</td>${ofs.map(o=>`<td class="n">${(o.gatesDoc||{})[r.id]===true?'cumple':(o.gatesDoc||{})[r.id]===false?'no cumple':'—'}</td>`).join('')}<td></td></tr>`;
  });
  h+='</tbody></table>';
  return h;
}

/* ---- acta / informe imprimible ---- */
function renderActa(R){
  const box=$("#acta"); if(!box) return;
  const ofs=(S.oferentes||[]).filter(o=>o.nombre.trim()||o.precio);
  const com=S.comision||[];
  const pres = com.find(m=>/presiden/i.test(m.rol))||com[0]||{};
  const secr = com.find(m=>/secretar/i.test(m.rol))||com[com.length-1]||{};
  const ivaP = num(S.ivaPct)||0;
  const totMax=puntosTotales();
  // A la fase económica pasan quienes superaron la técnica y no fueron rechazados; entre ellos,
  // los que superan el presupuesto se muestran pero no se adjudican.
  const calificados = ofs.filter(o=>o._tecPass && !o.descal);
  const presLetras = S.presupuesto? numeroALetras(S.presupuesto):'—';
  const colH = o=>esc(o.nombre?trunc(o.nombre,22):'Proponente');
  const trunc=(s,n)=>s.length>n?s.slice(0,n-1)+'…':s;

  // DATOS DEL PROCESO
  const kv=(l,v)=>`<tr><th style="width:36%">${l}</th><td>${v||'—'}</td></tr>`;
  const datos=`<table>${
    kv('Objeto de la contratación', esc(S.objeto))+
    kv('Área protegida / instancia beneficiaria', esc(S.area))+
    kv('Modalidad de selección', esc(S.modalidad))+
    kv('Presupuesto referencial (USD, IVA incluido)', S.presupuesto?esc(presLetras):'—')+
    kv('Fuente de financiamiento / PAG', esc(fuenteFinanciamientoTexto()))+
    kv('Fecha de invitación', esc(S.fechaInvitacion))+
    kv('Plazo para presentación de ofertas', esc(S.fechaLimiteOfertas))
  }</table>`;

  // QUÓRUM — separado en voz y voto / voz sin voto (formato FO-AD-ABC-009)
  const votM=com.filter(m=>m.voto), sinVoto=com.filter(m=>!m.voto);
  const quorumTabla = arr=>`<table><thead><tr><th>Nombre</th><th>Cargo institucional</th><th>Rol en la Comisión</th><th>Asistencia</th></tr></thead><tbody>${
    arr.map(m=>`<tr><td>${esc(m.nombre||'(por designar)')}</td><td>${esc(m.cargo)}</td><td>${esc(m.rol)}</td><td>Presencial / Virtual</td></tr>`).join('')}</tbody></table>`;
  const quorum=`<h3>Constatación de quórum</h3>
    <p style="font-weight:700;font-size:12.5px;margin:6px 0 2px">Miembros con voz y voto</p>${quorumTabla(votM.length?votM:[{}])}
    ${sinVoto.length?`<p style="font-weight:700;font-size:12.5px;margin:12px 0 2px">Miembros con voz (sin voto) y Secretaría</p>${quorumTabla(sinVoto)}`:''}`;

  // PRIMERO — proponentes recibidos
  const recibidos=`<table><thead><tr><th>Proponente</th><th>Fecha de entrega</th><th>Hora</th><th>Estado</th></tr></thead><tbody>${
    (ofs.length?ofs:[{nombre:''}]).map(o=>`<tr><td>${esc(o.nombre||'—')}</td><td>${esc(o.fechaEntrega||'____________')}</td><td>${esc(o.horaEntrega||'__:__')}</td><td>A tiempo ☐&nbsp;&nbsp;Extemporánea ☐</td></tr>`).join('')
  }</tbody></table>`;

  // SEGUNDO — evaluación técnica
  let tecnico;
  if(S.tipo==='cumple'){
    tecnico=`<table><thead><tr><th>Parámetro técnico</th>${ofs.map(o=>`<th class="n">${colH(o)}</th>`).join('')}</tr></thead><tbody>${
      gateList().map(r=>`<tr><td>${esc(r.nombre)}</td>${ofs.map(o=>`<td class="n">${o.gates[r.id]===true?'Cumple':o.gates[r.id]===false?'No cumple':'—'}</td>`).join('')}</tr>`).join('')
    }<tr><th>Resultado de la evaluación técnica</th>${ofs.map(o=>`<td class="n"><b>${o._tecPass?(o.descal?'RECHAZADA':'CALIFICA'):'NO CALIFICA'}</b></td>`).join('')}</tr></tbody></table>`;
  }else{
    // consultoría por puntaje: matriz de documentos + tabla por miembro con voz y voto
    tecnico=`<p style="font-weight:700;font-size:12.5px;margin:2px 0">Matriz Cumple o No cumple — entrega de documentos</p>
      ${actaDocMatrix(ofs.length?ofs:[{nombre:''}])}
      <p style="font-size:12.5px;margin-top:12px">La evaluación técnica por puntaje se toma a cada miembro con voz y voto y se promedia por criterio. Umbral mínimo: <b>${fNum(num(S.umbralTecnico))} de ${fNum(tecMaxTotal())}</b> puntos.</p>
      ${(ofs.length?ofs:[]).map(o=>`<p style="font-weight:700;font-size:12.5px;margin:12px 0 2px">${esc(o.nombre||'Oferente')}</p>${actaTecnicaTable(o,false)}<p style="font-size:12px;color:#6B7180;margin:2px 0 0">${o._docOk?'Cumple la entrega de documentos. ':''}Promedio técnico ${fNum(o._tec||0)}/${fNum(tecMaxTotal())} — ${o._tecPass?'habilita a la evaluación económica.':'no alcanza el umbral / no cumple documentos.'}</p>`).join('')}`;
  }

  // TERCERO — evaluación económica
  let economico;
  if(!calificados.length){
    economico=`<p style="font-size:12.5px"><i>Ningún proponente superó la evaluación técnica; no se abren ofertas económicas.</i></p>`;
  }else if(S.tipo==='puntos'){
    economico = calificados.map(o=>`<p style="font-weight:700;font-size:12.5px;margin:6px 0 2px">${esc(o.nombre||'Oferente')} — RUC ${esc(o.ruc||'—')}</p>${actaTecnicaTable(o,true)}
      <p style="font-size:12px;margin:4px 0">Valor total ofertado: <b>${esc(numeroALetras(o.precio))}</b>${S.presupuesto?`; presupuesto referencial ${esc(numeroALetras(S.presupuesto))}${num(o.precio)<=num(S.presupuesto)?`, con un ahorro de ${esc(numeroALetras(num(S.presupuesto)-num(o.precio)))}`:' (supera el presupuesto)'}`:''}. Puntaje total: <b>${fNum(o._total||0)}/${fNum(puntosTotales())}</b>.</p>`).join('');
  }else{
    const econRows=(label,fn)=>`<tr><th>${label}</th>${calificados.map(o=>`<td class="n">${fn(o)}</td>`).join('')}</tr>`;
    economico=`<table><thead><tr><th>Concepto</th>${calificados.map(o=>`<th class="n">${colH(o)}</th>`).join('')}</tr></thead><tbody>${
        econRows(`Valor sin IVA (USD)`, o=>fUSD(num(o.precio)/(1+ivaP/100)))+
        econRows(`IVA (${fNum(ivaP)}%) (USD)`, o=>fUSD(num(o.precio)-num(o.precio)/(1+ivaP/100)))+
        econRows(`Valor total ofertado (USD)`, o=>`<b>${fUSD(o.precio)}</b>`)+
        (S.presupuesto? econRows(`¿Se ajusta al presupuesto referencial?`, o=>num(o.precio)<=num(S.presupuesto)?'Sí':'No') : '')
      }</tbody></table>${S.presupuesto?`<p style="font-size:11.5px;color:#6B7180">Presupuesto referencial: ${esc(numeroALetras(S.presupuesto))}.</p>`:''}`;
  }

  // CUARTO — adjudicación
  const w=R.winner;
  const notaUnica = R.esUnica ? `<p style="font-size:12.5px"><i>Propuesta única presentada: se recibió una sola oferta. Conforme a las bases, la Comisión se pronuncia expresamente sobre su conveniencia a los intereses institucionales ${R.unico&&R.unico.unicaOk===true?'y la declara <b>conveniente</b>':R.unico&&R.unico.unicaOk===false?'y la declara <b>no conveniente</b>':'(pronunciamiento pendiente)'}.</i></p>` : '';
  const adj = w
    ? `${notaUnica}<p style="font-size:12.5px"><b>☑ Recomienda la adjudicación</b> a favor de <b>${esc(w.nombre||'')}</b> con RUC ${esc(w.ruc||'____________')}, por un valor total de <b>${esc(numeroALetras(w.precio))}</b>, por ${S.tipo==='puntos'?`obtener el mayor puntaje total (${fNum(w._total)} de ${fNum(totMax)} puntos)`:'cumplir las condiciones solicitadas y ofertar el precio más bajo'}.</p>

function basesText(){
  const L=['\r'];
  if(S.tipo==='puntos'){
    const tot=puntosTotales(), tecMax=tecMaxTotal(), umbral=num(S.umbralTecnico), pesoEco=num(grupoEco().peso);
    const out=[];
    out.push(`CRITERIOS Y SUBCRITERIOS DE CALIFICACIÓN (sobre ${fNum(tot)} puntos)`);
    out.push('');
    out.push(`La calificación de las propuestas se realizará sobre un total de ${fNum(tot)} puntos, distribuidos en los siguientes parámetros:`);
    out.push('');
    gruposTecnicos().forEach(g=>{
      const s=g.criterios.reduce((a,c)=>a+num(c.max),0);
      out.push(`• ${g.nombre.toUpperCase()} — ${fNum(s)} puntos`);
      g.criterios.forEach(c=> out.push(`    - ${c.nombre}  (${fNum(num(c.max))} pts)`));
    });
    out.push(`• OFERTA ECONÓMICA — ${fNum(pesoEco)} puntos`);
    out.push(`    Se otorgará el máximo puntaje (${fNum(pesoEco)} pts) a la oferta más económica y, de forma inverso-proporcional, a las demás, aplicando la fórmula:`);
    out.push(`        Puntaje económico = ${fNum(pesoEco)} × (Precio más bajo ÷ Precio del oferente)`);
    out.push('');
    out.push(`UMBRAL TÉCNICO: pasarán a la evaluación de la oferta económica únicamente los oferentes que obtengan un mínimo de ${fNum(umbral)} puntos (sobre ${fNum(tecMax)}) en la evaluación técnica (perfil + oferta técnica).`);
    out.push('');
    out.push(`PUNTAJE TOTAL = puntaje técnico + puntaje económico. Se adjudicará al oferente que obtenga el mayor puntaje total.`);
    return out.join('\n');
  }
  const out=[];
  out.push('CRITERIOS DE CALIFICACIÓN');
  out.push('');
  out.push('Los requisitos legales y técnicos se evaluarán bajo la modalidad CUMPLE / NO CUMPLE y tienen carácter habilitante:');
  out.push('');
  out.push('REQUISITOS LEGALES:');
  (S.reqLegales||[]).forEach(r=>out.push(`    - ${r.nombre}`));
  out.push('');
  out.push('REQUISITOS TÉCNICOS:');
  (S.reqTecnicos||[]).forEach(r=>out.push(`    - ${r.nombre}`));
  out.push('');
  out.push('El oferente que no cumpla la totalidad de los requisitos legales no continuará en la evaluación técnica; y el que no cumpla la totalidad de los requisitos técnicos quedará descalificado y su oferta económica no será abierta ni considerada.');
  out.push('');
  out.push('ADJUDICACIÓN: entre los oferentes que cumplan la totalidad de los requisitos legales y técnicos, se adjudicará al de MENOR PRECIO.');
  return out.join('\n');
}

/* La Mágica no exporta el expediente completo (objeto, presupuesto, todos los oferentes):
   su único archivo descargable es el registro de cierre (código, tipo de proceso, área y
   el proveedor ganador con su monto). Se importa lo que sí trae, como punto de partida. */
function importarDesdeMagica(d){
  const trae=[d.codigoProceso&&'código',d.tipoProceso&&'tipo de proceso',d.areaNombre&&'área',d.proveedor&&'proveedor ganador'].filter(Boolean).join(', ');
  if(!confirm(`Este archivo es un registro de cierre de La Mágica, no un proceso del Calificador — trae ${trae||'muy pocos datos'}, pero no el objeto, el presupuesto ni los demás oferentes (eso solo existe en el navegador donde se generó). ¿Lo uso como punto de partida de un proceso nuevo?`)) return;
  const nuevoTipo = /consultor/i.test(d.tipoProceso||'') ? 'puntos' : 'cumple';
  const base = blankState(nuevoTipo);
  if(d.codigoProceso) base.codigo=d.codigoProceso;
  if(d.tipoProceso) base.tipoProceso=d.tipoProceso;
  if(d.areaNombre) base.area=d.areaNombre;
  if(d.proveedor) base.oferentes=[Object.assign(emptyOf(base),{nombre:d.proveedor, precio:d.monto?String(d.monto):''})];
  S=base; render();
  toast('Datos básicos importados de La Mágica — completa objeto, presupuesto, criterios y demás oferentes.');
}

/* Carga bajo demanda del motor de plantillas: si los <script> del <head> no llegaron a
   cargar (red corporativa / antivirus / caché), se reintenta al hacer clic. */
function cargarScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script'); s.src=src+'?v='+Date.now();
    s.onload=()=>res(); s.onerror=()=>rej(new Error(src));
    document.head.appendChild(s);
  });
}
async function asegurarMotor(){
  const listo=()=>window.PizZip && (window.docxtemplater||window.Docxtemplater);
  if(listo()) return true;
  try{ if(!window.PizZip) await cargarScript('vendor/pizzip.min.js'); }catch(e){}
  try{ if(!(window.docxtemplater||window.Docxtemplater)) await cargarScript('vendor/docxtemplater.min.js'); }catch(e){}
  return listo();
}

      toast('Acta Word generada');
    })
    .catch(()=>toast('No se pudo cargar la plantilla del acta (ábrelo en el sitio publicado, no como archivo local).'));
}

let menuOpen=false;
$("#btnEjemplos").onclick=(e)=>{
  e.stopPropagation();
  if(menuOpen){ closeMenu(); return; }
  const b=$("#btnEjemplos"); const r=b.getBoundingClientRect();
  const m=document.createElement('div'); m.id='exMenu';
  m.style.cssText=`position:fixed;top:${r.bottom+6}px;left:${r.left}px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 44px rgba(11,21,63,.16);z-index:60;overflow:hidden;min-width:280px`;
  m.innerHTML=`
    <button class="exitem" data-p="cons" style="all:unset;cursor:pointer;display:block;padding:12px 14px;border-bottom:1px solid var(--line2);width:100%;box-sizing:border-box"><b>Consultoría por puntos</b><div style="font-size:11.5px;color:var(--muted)">Delitos ambientales · 35/45/20 · umbral 75</div></button>
    <button class="exitem" data-p="bien" style="all:unset;cursor:pointer;display:block;padding:12px 14px;width:100%;box-sizing:border-box"><b>Bienes · Cumple / No cumple</b><div style="font-size:11.5px;color:var(--muted)">Motor fuera de borda PN Machalilla · menor precio</div></button>`;
  document.body.appendChild(m); menuOpen=true;
  $$(".exitem",m).forEach(it=>it.onclick=()=>{ S = it.dataset.p==='cons'?presetConsultoria():presetBienes(); render(); closeMenu(); toast('Ejemplo cargado'); });
  setTimeout(()=>document.addEventListener('click',closeMenu,{once:true}),0);
};
function closeMenu(){ const m=$("#exMenu"); if(m)m.remove(); menuOpen=false; }

function toCSV(){
  const R=compute(); const rows=[];
  const H=['Orden','Oferente','RUC/CI','Precio'];
  if(S.tipo==='puntos'){ critList().forEach(c=>H.push(c.nombre)); H.push('Tecnico','Umbral','Economico','Total'); }
  else{ gateList().forEach(r=>H.push(r.nombre)); H.push('Legal','Tecnico','Estado'); }
  rows.push(H);
  const ordered=[...(S.oferentes||[])].sort((a,b)=>{ if(a._pasa!==b._pasa)return a._pasa?-1:1; return S.tipo==='cumple'?(num(a.precio)||1e15)-(num(b.precio)||1e15):b._total-a._total; });
  ordered.forEach(o=>{
    const row=[o._rank||'', o.nombre||'', o.ruc||'', num(o.precio)||''];
    if(S.tipo==='puntos'){ critList().forEach(c=>row.push(o.scores[c.id]==null?'':clamp(num(o.scores[c.id]),0,num(c.max)))); row.push(o._tec, o._pasa?'Pasa':'No pasa', o._pasa?o._eco:'', o._total); }
    else{ gateList().forEach(r=>row.push(o.gates[r.id]===true?'Cumple':o.gates[r.id]===false?'No cumple':'')); row.push(o._legalOk?'Cumple':'No', o._tecOk?'Cumple':'No', o._pasa?(R.winner&&o.id===R.winner.id?'Adjudicado':'Habilitado'):'Descalificado'); }
    rows.push(row);
  });
  return rows.map(r=>r.map(v=>{ const s=String(v==null?'':v); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(';')).join('\n');
}
