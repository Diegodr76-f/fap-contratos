<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLM FAP · Contract Lifecycle Management · FIAS</title>
<meta name="description" content="Plataforma única de gestión del ciclo de vida de contratos del FAP/FIAS: solicitudes, repositorio, pipeline, obligaciones, modificaciones, terminación, calificación de proveedores, reportes y bitácora.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
<!-- Librerías de generación de Word alojadas en el propio repositorio (no en CDN externos):
     evita el bloqueo de redes corporativas y reduce falsos positivos de antivirus. -->
<script src="vendor/pizzip.min.js"></script>
<script src="vendor/docxtemplater.min.js"></script>
<style>
  :root{
    --navy:#00249C; --navy2:#2547C9; --ink:#0B153F; --bg:#F4F6FB; --card:#fff;
    --line:#E3E6F0; --line2:#EAEDF5; --muted:#6B7180; --muted2:#9AA0B2;
    --green:#1E9E5A; --greenbg:#E7F6EE; --amber:#C98A08; --amberbg:#FCF3DD;
    --red:#D23A3A; --redbg:#FBE7E7; --tint:#EEF1FB; --violet:#6A44C9; --teal:#0E9AA7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:'Titillium Web',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px}
  a{color:var(--navy);text-decoration:none}
  button{font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  ::placeholder{color:var(--muted2)}
  @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .up{animation:up .25s ease}

  /* ===== shell ===== */
  .shell{display:flex;min-height:100vh}
  aside.side{width:230px;flex:0 0 230px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .side-brand{display:flex;align-items:center;gap:11px;padding:16px 16px 14px;border-bottom:1px solid var(--line2)}
  .logo{width:40px;height:40px;border-radius:10px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:0 0 auto}
  .side-brand .t{font-weight:700;font-size:14px;line-height:1.15}
  .side-brand .s{font-size:11px;color:var(--muted)}
  .navgrp{font-size:10.5px;font-weight:700;letter-spacing:.7px;color:var(--muted2);text-transform:uppercase;padding:16px 18px 6px}
  .navitem{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:9px 14px;margin:1px 8px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--muted);width:calc(100% - 16px)}
  .navitem:hover{background:var(--tint);color:var(--navy)}
  .navitem.on{background:var(--navy);color:#fff}
  .navitem .nbadge{margin-left:auto;font-size:11px;font-weight:700;background:var(--redbg);color:var(--red);padding:1px 8px;border-radius:99px}
  .navitem.on .nbadge{background:rgba(255,255,255,.22);color:#fff}
  .side-foot{margin-top:auto;border-top:1px solid var(--line2);padding:12px 14px;display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--tint);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto}
  .side-foot .n{font-size:12.5px;font-weight:700;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .side-foot .r{font-size:11px;color:var(--muted)}
  .iconbtn{all:unset;cursor:pointer;color:var(--muted);padding:6px;border-radius:8px;display:flex}
  .iconbtn:hover{background:var(--tint);color:var(--navy)}

  main.main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:14px;background:#fff;border-bottom:1px solid var(--line);padding:0 22px;height:58px;position:sticky;top:0;z-index:15}
  .topbar h1{font-size:16.5px;font-weight:700;margin:0}
  .gsearch{margin-left:auto;position:relative;width:min(340px,38vw)}
  .gsearch input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--line);border-radius:10px;background:var(--bg)}
  .gsearch input:focus{outline:none;border-color:var(--navy);background:#fff}
  .gsearch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%)}
  .gresults{position:absolute;top:44px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 44px rgba(11,21,63,.14);max-height:330px;overflow:auto;z-index:40}
  .gres{display:block;padding:10px 13px;border-bottom:1px solid var(--line2);cursor:pointer}
  .gres:hover{background:var(--tint)}
  .gres .a{font-size:13px;font-weight:700;color:var(--ink)}
  .gres .b{font-size:11.5px;color:var(--muted)}
  .content{padding:22px 24px 70px;max-width:1220px;width:100%;margin:0 auto}
  .content.full{max-width:none;padding:0;display:flex;flex-direction:column;flex:1}

  .srcpill{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--muted);background:var(--bg);border:1px solid var(--line2);padding:5px 10px;border-radius:99px;white-space:nowrap}
  .srcdot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .srcdot.off{background:var(--amber)}

  @media(max-width:860px){
    .shell{flex-direction:column}
    aside.side{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center}
    .side-brand{border:0}
    .navgrp{display:none}
    .navitem{width:auto;padding:8px 11px}
    .side-foot{margin-left:auto;border:0}
  }

  /* ===== atoms ===== */
  .btn{all:unset;box-sizing:border-box;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--navy);color:#fff;font-weight:700;font-size:13.5px;padding:11px 17px;border-radius:10px;transition:filter .15s}
  .btn:hover{filter:brightness(1.1)}
  .btn.line{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .btn.line:hover{background:var(--bg);filter:none}
  .btn.danger{background:var(--red)}
  .btn.sm{padding:8px 13px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .panel{background:#fff;border:1px solid var(--line2);border-radius:15px;padding:20px 22px}
  .ptitle{font-size:14.5px;font-weight:700;margin:0 0 3px}
  .psub{font-size:12px;color:var(--muted);margin:0 0 14px}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .b-g{background:var(--greenbg);color:var(--green)} .b-a{background:var(--amberbg);color:var(--amber)}
  .b-r{background:var(--redbg);color:var(--red)} .b-d{background:#EEF0F5;color:var(--muted)}
  .b-n{background:var(--tint);color:var(--navy)} .b-v{background:#EFE6FA;color:var(--violet)}
  .chip{all:unset;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted);padding:8px 13px;border:1.5px solid var(--line);border-radius:99px;background:#fff}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .catchip{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:1000px){.kpis{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:#fff;border:1px solid var(--line2);border-radius:13px;padding:14px 16px;cursor:pointer;transition:box-shadow .15s}
  .kpi:hover{box-shadow:0 10px 26px rgba(11,21,63,.08)}
  .kpi-n{font-size:24px;font-weight:700;line-height:1}
  .kpi-l{font-size:11.5px;color:var(--muted);margin-top:6px;font-weight:600}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 16px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--line);border-radius:10px;background:#fff}
  .search input:focus{outline:none;border-color:var(--navy)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%)}
  .viewtog{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
  .viewtog button{all:unset;cursor:pointer;padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--muted)}
  .viewtog button.on{background:var(--navy);color:#fff}

  /* tables */
  .tablewrap{background:#fff;border:1px solid var(--line2);border-radius:14px;overflow-x:auto}
  table.list{width:100%;border-collapse:collapse;min-width:760px}
  table.list th{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted2);text-align:left;padding:12px 13px;border-bottom:1.5px solid var(--line2);background:#FAFBFE;white-space:nowrap}
  table.list td{font-size:13px;padding:11px 13px;border-bottom:1px solid var(--line2);vertical-align:middle}
  table.list tbody tr{cursor:pointer}
  table.list tbody tr:hover{background:var(--tint)}
  .td-nro{font-weight:700;color:var(--navy);white-space:nowrap}
  .td-obj{font-weight:600;max-width:280px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .dot.g{background:var(--green)}.dot.a{background:var(--amber)}.dot.r{background:var(--red)}.dot.done{background:var(--muted2)}

  /* cards grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
  .cc{background:#fff;border:1px solid var(--line2);border-radius:14px;padding:16px;cursor:pointer;transition:box-shadow .15s,transform .15s;border-left:5px solid var(--line);position:relative}
  .cc:hover{box-shadow:0 12px 30px rgba(11,21,63,.09);transform:translateY(-2px)}
  .cc.g{border-left-color:var(--green)}.cc.a{border-left-color:var(--amber)}.cc.r{border-left-color:var(--red)}.cc.done{border-left-color:var(--muted2);opacity:.85}
  .cc-nro{font-size:11.5px;font-weight:700;color:var(--navy)}
  .cc-title{font-size:14px;font-weight:700;margin:7px 0 2px;line-height:1.3}
  .cc-area{font-size:12px;color:var(--muted);margin-bottom:10px}
  .cc-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .cc-meta b{color:var(--ink)}

  /* pipeline */
  .kanban{display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:13px;overflow-x:auto;align-items:start}
  @media(max-width:1100px){.kanban{grid-template-columns:repeat(5,240px)}}
  .kcol{background:#EDF0F8;border-radius:14px;padding:11px}
  .kcol-h{display:flex;align-items:center;gap:8px;padding:3px 5px 10px}
  .kcol-h .kdot{width:10px;height:10px;border-radius:50%}
  .kcol-h .kt{font-size:12.5px;font-weight:700}
  .kcol-h .kc{margin-left:auto;font-size:11px;font-weight:700;color:var(--muted);background:#fff;padding:2px 8px;border-radius:99px}
  .kcol-sum{font-size:11px;color:var(--muted);padding:0 5px 9px;font-weight:600}
  .kcard{background:#fff;border:1px solid var(--line2);border-radius:11px;padding:11px 12px;margin-bottom:9px;cursor:pointer;transition:box-shadow .13s}
  .kcard:hover{box-shadow:0 8px 20px rgba(11,21,63,.1)}
  .kcard .a{font-size:11px;font-weight:700;color:var(--navy)}
  .kcard .b{font-size:12.5px;font-weight:700;line-height:1.3;margin:3px 0 4px}
  .kcard .c{font-size:11px;color:var(--muted)}

  /* detail */
  .back{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:14px}
  .back:hover{text-decoration:underline}
  .detail{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
  @media(max-width:920px){.detail{grid-template-columns:1fr}}
  .h-title{font-size:19px;font-weight:700;margin:0 0 2px;line-height:1.3}
  .dl{display:grid;grid-template-columns:1fr 1fr;gap:13px 20px;margin-top:8px}
  .dl .k{font-size:10.5px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
  .dl .v{font-size:14px;font-weight:600}
  .dl .full{grid-column:1/-1}
  .linkbar{display:flex;align-items:center;gap:10px;background:var(--tint);border:1px solid #D7DEF6;border-radius:11px;padding:11px 13px;margin:14px 0 4px}
  .phase{display:flex;align-items:center;margin:16px 0 4px;flex-wrap:wrap;row-gap:8px}
  .step{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;color:var(--muted2)}
  .step .d{width:24px;height:24px;border-radius:7px;background:#EEF0F5;color:var(--muted2);display:flex;align-items:center;justify-content:center;font-size:12px}
  .step.on{color:var(--navy)}.step.on .d{background:var(--navy);color:#fff}
  .step.past{color:var(--green)}.step.past .d{background:var(--greenbg);color:var(--green)}
  .flow-line{flex:1;height:2px;background:var(--line2);margin:0 8px;min-width:14px}
  .act{display:flex;flex-direction:column;gap:9px}
  .actbtn{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;background:#fff;transition:border-color .14s,background .14s}
  .actbtn:hover{border-color:var(--navy);background:var(--tint)}
  .actbtn:disabled{opacity:.5;cursor:not-allowed}
  .actbtn:disabled:hover{border-color:var(--line);background:#fff}
  .actbtn .ic{width:32px;height:32px;border-radius:8px;background:var(--tint);color:var(--navy);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .actbtn .at{font-size:13.5px;font-weight:700;display:block}
  .actbtn .ad{font-size:11.5px;color:var(--muted);display:block;margin-top:1px}
  .note{font-size:12px;color:var(--muted);line-height:1.5;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:11px 13px}
  .tl{list-style:none;margin:6px 0 0;padding:0}
  .tl li{position:relative;padding:0 0 14px 22px;border-left:2px solid var(--line2);margin-left:7px}
  .tl li:last-child{padding-bottom:2px}
  .tl li::before{content:"";position:absolute;left:-6px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--navy2);border:2px solid #fff}
  .tl .t{font-size:12.5px;font-weight:700}
  .tl .s{font-size:11.5px;color:var(--muted)}

  /* modals */
  .overlay{position:fixed;inset:0;background:rgba(11,21,63,.44);display:flex;align-items:flex-start;justify-content:center;padding:36px 18px;overflow:auto;z-index:60}
  .modal{background:#fff;border-radius:16px;max-width:580px;width:100%;padding:24px 26px 22px;box-shadow:0 30px 80px rgba(11,21,63,.3);animation:up .2s ease}
  .modal h2{font-size:19px;font-weight:700;margin:0 0 3px}
  .modal .sub{font-size:13px;color:var(--muted);margin:0 0 16px;line-height:1.5}
  .frow{margin-bottom:13px}
  .frow label{display:block;font-size:12px;font-weight:700;margin-bottom:5px}
  .frow input,.frow select,.frow textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff}
  .frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--navy)}
  .frow textarea{resize:vertical;min-height:70px}
  .frow2{display:flex;gap:10px}
  .frow2>.frow{flex:1;margin:0}
  .radios{display:flex;flex-direction:column;gap:8px}
  .radio{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;cursor:pointer}
  .radio:hover{border-color:var(--navy)}
  .radio.sel{border-color:var(--navy);background:var(--tint)}
  .radio input{margin-top:2px;accent-color:var(--navy)}
  .radio .rt{font-size:13.5px;font-weight:700;display:block}
  .radio .rd{font-size:11.5px;color:var(--muted);display:block;margin-top:1px}
  .routebox{border-radius:11px;padding:12px 14px;margin:6px 0 4px;font-size:13px;line-height:1.55;border:1.5px solid}
  .route-acta{background:var(--greenbg);border-color:#BCE6CE;color:#15703F}
  .route-adenda{background:var(--amberbg);border-color:#F0DCA6;color:#8A5E06}
  .route-block{background:var(--redbg);border-color:#F3C0C0;color:#A32020}
  .secdiv{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin:15px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--line2)}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  .steps{background:#F4F7FE;border:1px solid #D7DFF5;border-radius:12px;padding:13px 15px;margin-top:12px}
  .steps h3{margin:0 0 7px;font-size:13px;color:var(--navy)}
  .steps ol{margin:0;padding-left:19px;font-size:12.5px;line-height:1.65}
  .crit{margin-bottom:11px}
  .scorebox{background:var(--bg);border:1px solid var(--line2);border-radius:12px;padding:13px 15px;margin-top:14px;display:flex;align-items:center;justify-content:space-between}
  .scorebox .big{font-size:28px;font-weight:700;line-height:1}
  .scorebox .lab{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .semaforo{font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:99px}
  .scorebtn.on{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:12px 19px;border-radius:11px;box-shadow:0 14px 40px rgba(11,21,63,.3);z-index:90;animation:up .22s ease}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}

  /* charts */
  .charts{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;margin-bottom:18px}
  @media(max-width:980px){.charts{grid-template-columns:1fr}}
  .chart-svg{width:100%;height:auto;display:block}
  .bar{cursor:pointer}
  .bar:hover{filter:brightness(1.18)}
  .axlbl{font-size:10px;fill:var(--muted2);font-family:'Titillium Web',sans-serif}
  .vallbl{font-size:10.5px;font-weight:700;fill:var(--muted);font-family:'Titillium Web',sans-serif}
  .grid-line{stroke:var(--line2);stroke-width:1}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
  .legend .li{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted)}
  .legend .sw{width:11px;height:11px;border-radius:3px}
  #tip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-size:12px;font-weight:600;padding:7px 11px;border-radius:8px;z-index:95;display:none;box-shadow:0 10px 26px rgba(11,21,63,.3);max-width:260px;line-height:1.4}
  .stackbar{display:flex;height:34px;border-radius:9px;overflow:hidden;gap:2px;background:var(--bg)}
  .stackbar>div{display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;min-width:0;overflow:hidden;white-space:nowrap}

  /* alerts */
  .alert-row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line2);border-radius:12px;padding:12px 15px;margin-bottom:9px}
  .alert-row .aic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .alert-row .at{font-size:13px;font-weight:700}
  .alert-row .ad{font-size:11.5px;color:var(--muted)}
  .alert-row .go{margin-left:auto;flex:0 0 auto}

  /* login */
  .login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;background:linear-gradient(160deg,#F4F6FB 0%,#E8EDFB 100%)}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:32px 32px 28px;max-width:470px;width:100%;box-shadow:0 18px 50px rgba(11,21,63,.09)}
  .eyebrow{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--navy);background:var(--tint);padding:5px 11px;border-radius:99px;text-transform:uppercase}
  .login-card h1{font-size:24px;font-weight:700;margin:13px 0 5px;letter-spacing:-.3px}
  .lead{font-size:14px;color:var(--muted);margin:0 0 20px;line-height:1.55}
  .rolegrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}

/* ================= CIFRADO DE DATOS (WebCrypto) =================
   Los datos (JSON diario y copia embebida) se publican cifrados con
   AES-256-GCM. La frase de acceso se pide una sola vez y queda guardada
   en este navegador. Sin la frase, lo publicado es ilegible. */
const FAP_KEY_LS = "fap_data_key";
function fapIsEnc(o){ return !!(o && typeof o==="object" && o.fap_enc); }
async function fapDecrypt(env, pass){
  const b = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
  const salt=b(env.salt), iv=b(env.iv), ct=b(env.ct);
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations: env.iter||250000, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
function fapAskPass(msg){
  return new Promise(resolve=>{
    const wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#F4F6FB,#E8EDFB);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;padding:24px";
    wrap.innerHTML=`<form style="background:#fff;border:1px solid #E3E8F5;border-radius:18px;padding:30px 30px 26px;max-width:420px;width:100%;box-shadow:0 18px 50px rgba(11,21,63,.12)">
      <div style="width:48px;height:48px;border-radius:12px;background:#00249C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;margin-bottom:14px">🔒</div>
      <h1 style="font-size:21px;font-weight:700;margin:0 0 6px;color:#0B153F;letter-spacing:-.3px">Acceso protegido</h1>
      <p style="margin:0 0 16px;color:#5A6484;font-size:14px;line-height:1.5">Esta herramienta maneja información de contratos. Ingresa la <b>frase de acceso</b> que te compartió tu equipo para desbloquearla.</p>
      ${msg?`<div style="background:#FDECEC;color:#B3261E;border-radius:10px;padding:9px 12px;font-size:13px;margin-bottom:12px">${msg}</div>`:""}
      <input type="password" autocomplete="current-password" autofocus placeholder="Frase de acceso" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1.5px solid #D6DCEC;border-radius:11px;font-size:15px;color:#0B153F;outline:none" />
      <button type="submit" style="all:unset;cursor:pointer;display:block;text-align:center;width:100%;box-sizing:border-box;margin-top:14px;padding:12px;background:#00249C;color:#fff;border-radius:11px;font-weight:700;font-size:15px">Entrar</button>
    </form>`;
    const input=wrap.querySelector("input");
    wrap.querySelector("form").addEventListener("submit",e=>{
      e.preventDefault();
      const v=input.value.trim();
      if(v){ wrap.remove(); resolve(v); }
    });
    document.body.appendChild(wrap);
    input.focus();
  });
}
async function fapUnlock(env){
  let pass = localStorage.getItem(FAP_KEY_LS) || "";
  let msg = "";
  for(;;){
    if(pass){
      try{ const data = await fapDecrypt(env, pass); localStorage.setItem(FAP_KEY_LS, pass); return data; }
      catch(e){ localStorage.removeItem(FAP_KEY_LS); msg="Frase incorrecta. Inténtalo de nuevo."; }
    }
    pass = await fapAskPass(msg);
  }
}
// Descifra si viene cifrado; si ya es una lista en claro (retrocompatible), la devuelve tal cual.
async function fapMaybe(o){ return fapIsEnc(o) ? await fapUnlock(o) : o; }

const $=(s,el=document)=>el.querySelector(s);
function norm(s){return String(s==null?"":s).trim().toLowerCase();}

const money=n=>(n==null||n==="")?"—":"$"+Number(n).toLocaleString("es-EC",{minimumFractionDigits:2,maximumFractionDigits:2});

function moneyShort(n){n=Number(n)||0;if(n>=1e6)return "$"+(n/1e6).toFixed(1).replace(".0","")+" M";if(n>=1e3)return "$"+Math.round(n/1e3)+" k";return "$"+Math.round(n);}
function fdate(iso){if(!iso)return "—";const [y,m,d]=String(iso).split("-");const M=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return `${+d} ${M[+m-1]} ${y}`;}
function longDate(iso){if(!iso)iso=new Date().toISOString().slice(0,10);const [y,m,d]=String(iso).split("-");const M=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];return `${+d} de ${M[+m-1]} de ${y}`;}
function todayISO(){const t=new Date();const p=n=>String(n).padStart(2,"0");return t.getFullYear()+"-"+p(t.getMonth()+1)+"-"+p(t.getDate());}
function diasRestantes(c){if(!c.fin)return null;const t=new Date(todayISO()+"T00:00:00");const f=new Date(c.fin+"T00:00:00");return Math.round((f-t)/86400000);}

  const D=["","","VEINTE","TREINTA","CUARENTA","CINCUENTA","SESENTA","SETENTA","OCHENTA","NOVENTA"];
  const C=["","CIENTO","DOSCIENTOS","TRESCIENTOS","CUATROCIENTOS","QUINIENTOS","SEISCIENTOS","SETECIENTOS","OCHOCIENTOS","NOVECIENTOS"];
  function tres(x){x=Number(x);if(x===0)return "";if(x===100)return "CIEN";let s="";const c=Math.floor(x/100),r=x%100;
    if(c>0)s+=C[c]+" ";
    if(r<=20)s+=U[r];
    else{const d=Math.floor(r/10),u=r%10;
      if(r<30)s+="VEINTI"+U[u].toLowerCase().replace(/^./,m=>m.toUpperCase());
      else{s+=D[d];if(u>0)s+=" Y "+U[u];}}
    return s.trim();}
  function grupo(x,sing,plur){if(x===0)return "";if(x===1)return sing;return tres(x)+" "+plur;}
  let entero;
  if(ent===0)entero="CERO";
  else{const mill=Math.floor(ent/1000000),rm=ent%1000000;const mil=Math.floor(rm/1000),rc=rm%1000;let partes=[];
    if(mill>0)partes.push(grupo(mill,"UN MILLÓN","MILLONES"));
    if(mil>0)partes.push(mil===1?"MIL":tres(mil)+" MIL");
    if(rc>0)partes.push(tres(rc));
    entero=partes.join(" ").trim();}
  const bruto=`${entero} CON ${String(cent).padStart(2,"0")}/100 DÓLARES DE LOS ESTADOS UNIDOS DE AMÉRICA`;
  let s=bruto.charAt(0)+bruto.slice(1).toLowerCase();
  s=s.replace(/estados unidos de américa/i,"Estados Unidos de América");
  return s;
}

];

/* estado vivo del contrato (con overlay del CLM) */
function statusLive(c){
  const o=ov(c);
  if(c.cerrado)return {cls:"done",b:"b-d",label:"Cerrado",key:"cerrado"};
  if(o.terminado)return {cls:"done",b:"b-d",label:"Terminado",key:"terminado"};
  const d=diasRestantes(c);
  if(d==null)return {cls:"g",b:"b-g",label:"Vigente",key:"vigente"};
  if(d<0)return {cls:"r",b:"b-r",label:"Vencido",key:"vencido"};
  if(d<=90)return {cls:"a",b:"b-a",label:`Por vencer · ${d}d`,key:"aviso"};
  return {cls:"g",b:"b-g",label:`Vigente · ${d}d`,key:"vigente"};
}
function vigenciaText(c){
  const o=ov(c);
  if(c.cerrado)return "Contrato cerrado";
  if(o.terminado)return "Contrato terminado";
  const d=diasRestantes(c);
  if(d==null)return "Sin fecha de fin";
  if(d<0)return `Vencido hace ${Math.abs(d)} día${Math.abs(d)==1?"":"s"}`;
  if(d===0)return "Vence hoy";
  if(d<=90)return `Vence en ${d} días (aviso)`;
  const meses=Math.floor(d/30);
  return `${d} días restantes${meses>=2?` · ~${meses} meses`:""}`;
}

/* ================= CHARTS (SVG inline) ================= */
function barChartMeses(data){ /* data: [{label,count,monto}] */
  const W=560,H=190,padL=8,padB=22,padT=14;
  const max=Math.max(1,...data.map(d=>d.count));
  const bw=(W-padL*2)/data.length;
  const ticks=[0,Math.ceil(max/2),max];
  let g=ticks.map(t=>{const y=padT+(H-padT-padB)*(1-t/max);return `<line class="grid-line" x1="${padL}" y1="${y}" x2="${W-padL}" y2="${y}"/><text class="axlbl" x="${padL}" y="${y-3}">${t}</text>`;}).join("");
  let bars=data.map((d,i)=>{
    const h=(H-padT-padB)*(d.count/max);
    const x=padL+i*bw+bw*0.18, y=H-padB-h, w=bw*0.64;
    const lbl=d.count>0?`<text class="vallbl" x="${x+w/2}" y="${y-4}" text-anchor="middle">${d.count}</text>`:"";
    return `<rect class="bar" x="${x}" y="${y}" width="${w}" height="${Math.max(h,1)}" rx="3" fill="var(--navy2)" data-tip="<b>${esc(d.label)}</b><br>${d.count} contrato(s) vencen<br>${money0(d.monto)} en juego"/>${lbl}
      <text class="axlbl" x="${x+w/2}" y="${H-7}" text-anchor="middle">${esc(d.label)}</text>`;
  }).join("");
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Vencimientos por mes">${g}${bars}</svg>`;
}
function barChartH(data,fmt){ /* data: [{label,value,tip}] una serie navy */
  const max=Math.max(1,...data.map(d=>d.value));
  return data.map(d=>{
    const pct=Math.max(1.5,d.value/max*100);
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px" data-tip="${esc(d.tip||"")}">
      <div style="flex:0 0 128px;font-size:12px;font-weight:600;color:var(--muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.label)}</div>
      <div style="flex:1;background:var(--bg);border-radius:6px;height:20px;position:relative">
        <div class="bar" style="width:${pct}%;height:100%;background:var(--navy2);border-radius:6px"></div>
      </div>
      <div style="flex:0 0 74px;font-size:12px;font-weight:700">${fmt(d.value)}</div>
    </div>`;

}
function stackEstado(segs){ /* status: colores reservados + etiqueta visible + leyenda con conteos */
  const total=segs.reduce((a,s)=>a+s.n,0)||1;
  const bar=segs.filter(s=>s.n>0).map(s=>{
    const pct=s.n/total*100;
    return `<div style="flex:${s.n};background:${s.col}" data-tip="<b>${esc(s.label)}</b>: ${s.n} (${pct.toFixed(0)}%)">${pct>=9?s.n:""}</div>`;
  }).join("");
  const leg=segs.map(s=>`<span class="li"><span class="sw" style="background:${s.col}"></span>${esc(s.label)} · <b style="color:var(--ink)">${s.n}</b></span>`).join("");
  return `<div class="stackbar">${bar}</div><div class="legend">${leg}</div>`;
}

    else if(s.key==="aviso"&&d<=30)out.push({sev:1,icon:"⏰",col:"var(--red)",bg:"var(--redbg)",t:`Vence en ${d}d — ${c.nro}`,d:`${trunc(c.detalle,110)} · decide renovación o terminación ya`,i,act:"Abrir",fn:"open"});
    else if(s.key==="aviso")out.push({sev:2,icon:"🔔",col:"var(--amber)",bg:"var(--amberbg)",t:`Por vencer (${d}d) — ${c.nro}`,d:`${trunc(c.detalle,110)} · ventana de renovación abierta`,i,act:"Abrir",fn:"open"});
    if(o.pendienteEnvio)out.push({sev:1,icon:"📤",col:"var(--violet)",bg:"#EFE6FA",t:`Envío pendiente a la Unidad Operativa — ${c.nro}`,d:o.pendienteEnvio.tipoEnvio,i,act:"Enviar",fn:"env"});
    if((o.terminado||c.cerrado)&&!o.evaluado)out.push({sev:2,icon:"⭐",col:"var(--teal)",bg:"#DDF3F0",t:`Proveedor sin calificar — ${c.nro}`,d:`${c.proveedor||"—"} · la calificación alimenta la base de proveedores`,i,act:"Calificar",fn:"cal"});
  });
  mySolicitudes().forEach(s=>{

    if(k==="vigente")n.vig++;else if(k==="aviso")n.avi++;else if(k==="vencido")n.ven++;else n.ter++;

function alertRowHTML(a){

function bindAlertRows(){
  $("#view").querySelectorAll(".alert-row .go").forEach(b=>b.onclick=()=>{

    const i=+b.dataset.i;const c=CONTRACTS[i];

function vPipeline(){

            : items.map(({c,i})=>`<div class="kcard" data-i="${i}"><div class="a">${esc(c.nro)}</div><div class="b">${esc(trunc(c.detalle,80))}</div><div class="c">${esc(c.area||"")} · ${money0(montoDe(c))}${col.key==="aviso"?` · ${diasRestantes(c)}d`:""}</div></div>`).join("")||`<div class="kcard" style="text-align:center;color:var(--muted2);cursor:default">vacío</div>`}

/* ================= VISTA: CONTRATOS (repositorio) ================= */
function filteredContracts(){
  return myContracts().filter(c=>{
    if(ST.filter!=="all"){
      const k=statusLive(c).key;
      if(ST.filter==="vig"&&k!=="vigente")return false;
      if(ST.filter==="avi"&&k!=="aviso")return false;
      if(ST.filter==="ven"&&k!=="vencido")return false;
      if(ST.filter==="ter"&&!(k==="terminado"||k==="cerrado"))return false;
    }
    if(ST.catFilter!=="all"&&(c.cat||"—")!==ST.catFilter)return false;
    if(ST.q){const hay=norm(c.detalle+" "+c.nro+" "+c.area+" "+c.proveedor+" "+c.cat);if(!hay.includes(norm(ST.q)))return false;}
    return true;
  });
}

function openModal(html){

  document.body.appendChild(o);
  o.addEventListener("click",e=>{if(e.target===o)o.remove();});

/* --- Motor de plantillas .docx reales (las mismas del CRM) --- */
function docxEngineReady(){return !!(window.PizZip&&(window.docxtemplater||window.Docxtemplater));}
const TPL_CACHE={};
async function loadTemplate(nombre){
  if(TPL_CACHE[nombre])return TPL_CACHE[nombre];
  const res=await fetch(TPL_PATH+nombre,{cache:"no-store"});
  if(!res.ok)throw new Error(`No se encontró la plantilla ${nombre} (HTTP ${res.status})`);
  const buf=await res.arrayBuffer();TPL_CACHE[nombre]=buf;return buf;
}
async function generarDocx(nombrePlantilla,data,nombreSalida){
  if(!docxEngineReady())throw new Error("El motor de documentos no cargó. Revisa tu conexión a internet e inténtalo de nuevo.");
  const buf=await loadTemplate(nombrePlantilla);
  const zip=new PizZip(buf.slice(0));
  const DT=window.docxtemplater||window.Docxtemplater;
  const doc=new DT(zip,{paragraphLoop:true,linebreaks:true,delimiters:{start:"{",end:"}"}});
  doc.render(data);
  const out=doc.getZip().generate({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  const url=URL.createObjectURL(out);
  const a=document.createElement("a");a.href=url;a.download=nombreSalida+".docx";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

    <div class="scorebox"><div><div class="lab">Calificación final</div><div class="big" id="score" style="color:var(--navy)">—</div></div><div id="semwrap"></div></div>
    <div id="conseq" style="font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:11px"></div>
    <div class="modal-foot"><button class="btn line" id="cancel">Cancelar</button><button class="btn" id="gen">Registrar y exportar</button></div>`);
  function tier(s){
    if(s>=90)return {sem:"Confiable (Preferente)",bg:"var(--greenbg)",fg:"var(--green)",elegible:true,cons:"Proveedor confiable. Elegible para procesos ágiles y futuras contrataciones sin observaciones."};
    if(s>=80)return {sem:"Satisfactorio",bg:"var(--greenbg)",fg:"var(--green)",elegible:true,cons:"Proveedor satisfactorio. Elegible para futuras contrataciones."};
    if(s>=70)return {sem:"Aceptable – Observado",bg:"var(--amberbg)",fg:"var(--amber)",elegible:true,cons:"Debe notificarse al proveedor respecto a las observaciones. En caso de repetición, actualizar la calificación de inmediato."};
    if(s>=60)return {sem:"Deficiente – Inaceptable",bg:"var(--redbg)",fg:"var(--red)",elegible:false,cons:"No se considerará en próximos procesos de contratación."};
    return {sem:"No recomendado",bg:"var(--redbg)",fg:"var(--red)",elegible:false,cons:"Se subirá al sistema de FIAS como un proveedor no recomendado."};
  }
  function calc(){
    let total=0;
    const aportes=GRUPOS.map((g,gi)=>{
      const suma=vals[gi].reduce((a,b)=>a+b,0),max=g.items.length*3;
      const aporte=suma/max*g.w*100;total+=aporte;
      return {nombre:g.nombre,aporte};
    });
    total=Math.round(total*100)/100;
    const t=tier(total);
    $("#score",o).textContent=total.toFixed(2);
    $("#semwrap",o).innerHTML=`<span class="semaforo" style="background:${t.bg};color:${t.fg}">${esc(t.sem)}</span>`;
    $("#conseq",o).innerHTML=`<b>Consecuencia:</b> ${esc(t.cons)}${total<70?" · <b>No elegible</b> (mínimo aprobatorio: 70/100).":""}`;
    o._score=total;o._t=t;o._aportes=aportes;
  }
  o.querySelectorAll(".scorebtn").forEach(b=>b.onclick=()=>{
    const g=+b.dataset.g,i=+b.dataset.i;vals[g][i]=+b.dataset.v;
    o.querySelectorAll(`.scorebtn[data-g="${g}"][data-i="${i}"]`).forEach(x=>x.classList.toggle("on",x===b));
    calc();
  });
  calc();
  $("#cancel",o).onclick=()=>closeModal(o);
  $("#gen",o).onclick=()=>{
    const O=ov(c);O.evaluado=true;O.score=o._score.toFixed(2);O.sem=o._t.sem;saveCLM();
    const BOM="\uFEFF",ap=o._aportes;
    const csv=BOM+[
      ["Nro. Contrato","Nombre Proveedor","Área Protegida","Categoría","Administrador/a AC","Fecha Evaluación","Calidad (40%)","Plazo (30%)","Atención (5%)","Cump. Contractual (25%)","PUNTAJE TOTAL","RESULTADO","Elegible Futuros Proc.","Observaciones"].join(";"),
      [c.nro,c.proveedor||"",c.area||"",c.cat||"",c.ac||"",todayISO(),
       ...ap.map(a=>String(a.aporte.toFixed(2)).replace(".",",")),
       String(o._score.toFixed(2)).replace(".",","),o._t.sem,o._t.elegible?"Sí":"No",""].join(";")
    ].join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`Calificacion_${cleanNro(c.nro)}.csv`;a.click();URL.revokeObjectURL(a.href);
    logAdd("⭐",`Proveedor calificado: ${o._score.toFixed(2)}/100 · ${o._t.sem}`,c.nro);
    o.querySelector(".modal").innerHTML=`
      <h2>✅ Calificación registrada</h2>
      <p class="sub">${esc(c.proveedor||"—")} · ${o._score.toFixed(2)}/100 · ${esc(o._t.sem)}</p>
      <div class="steps"><h3>Próximos pasos</h3><ol>

        <li>Pégala en <b>"Registro de Calificaciones"</b> (banco acumulativo) y en la <b>Base de proveedores FAP</b>.</li>
        ${!o._t.elegible?"<li><b>Proveedor no elegible</b> — repórtalo también a la Unidad Operativa.</li>":""}
      </ol></div>
      <div class="modal-foot"><button class="btn" id="okpasos">Entendido</button></div>`;

/* --- Envío a la Unidad Operativa --- */
function fileToB64(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(String(fr.result).split(",")[1]||"");
    fr.onerror=()=>rej(fr.error||new Error("lectura"));
    fr.readAsDataURL(file);
  });
}
function modalEnvioUO(c,ctx){
  ctx=ctx||{tipoEnvio:"Documentos del contrato",instrumento:""};
  const o=openModal(`
    <h2>Enviar a la Unidad Operativa</h2>
    <p class="sub">${esc(c.nro)} · ${esc(ctx.tipoEnvio)} — los archivos suben al flujo de Power Automate y llegan a revisión legal.</p>
    <div class="frow2"><div class="frow"><label>Área protegida</label><input id="uoArea" value="${esc(c.area||"")}"></div>
    <div class="frow"><label>AC responsable</label><input id="uoAc" value="${esc(c.ac||SES.user)}"></div></div>
    <div class="frow2"><div class="frow"><label>Correo de contacto</label><input id="uoCorreo" value="${esc(c.correo||"")}" placeholder="correo@fias.org.ec"></div>
    <div class="frow"><label>Proveedor</label><input id="uoProveedor" value="${esc(c.proveedor||"")}"></div></div>
    <div class="frow2"><div class="frow"><label>Monto</label><input id="uoMonto" value="${montoDe(c).toFixed(2)}"></div>
    <div class="frow"><label>Instrumento</label><input value="${esc(ctx.instrumento||"—")}" disabled style="background:var(--bg)"></div></div>
    <div class="frow"><label>Objeto</label><input id="uoObjeto" value="${esc(c.detalle||"")}"></div>
    <div class="frow"><label>Observaciones para la Unidad Operativa</label><textarea id="uoObs" placeholder="Notas o contexto del envío…"></textarea></div>
    <div class="frow"><label>Archivos (borrador + contrato firmado; máx. 10 · 100 MB c/u)</label>
      <input id="uoFiles" type="file" multiple>
      <div id="uoStatus" style="font-size:12.5px;font-weight:700;margin-top:8px;color:var(--muted)"></div></div>
    <div class="modal-foot"><button class="btn line" id="cancel">Cancelar</button><button class="btn" id="send">Enviar a la Unidad Operativa</button></div>`);
  $("#cancel",o).onclick=()=>closeModal(o);
  $("#send",o).onclick=async()=>{
    const status=$("#uoStatus",o);
    const setS=(t,col)=>{status.textContent=t;status.style.color=col||"var(--green)";};
    const files=$("#uoFiles",o).files;
    if(!files||!files.length){setS("Adjunta al menos un archivo.","var(--red)");return;}
    if(files.length>10){setS("El límite es de 10 archivos por envío.","var(--red)");return;}
    for(let i=0;i<files.length;i++)if(files[i].size>100*1024*1024){setS(`«${files[i].name}» supera los 100 MB.`,"var(--red)");return;}
    const val=id=>String($("#"+id,o).value).trim();
    const meta={origen:"CLM",idEnvio:(c.nro||"")+"|"+new Date().toISOString(),codigoProceso:c.nro||"",
      area:val("uoArea"),siglas:"",ac:val("uoAc"),acCorreo:val("uoCorreo"),
      tipoProceso:ctx.tipoEnvio||"",nombreProceso:(c.nro||"")+" – "+(c.detalle||""),
      tipoEnvio:ctx.tipoEnvio||"",instrumento:ctx.instrumento||"",
      proveedor:val("uoProveedor"),monto:val("uoMonto"),objeto:val("uoObjeto"),observaciones:val("uoObs"),
      nombreCarpeta:String((c.nro||"contrato")+"_"+(ctx.tipoEnvio||"envio")).replace(/[\\/:*?"<>|\s]+/g,"_"),
      fecha:new Date().toISOString()};
    setS(`Preparando ${files.length} archivo(s)…`,"var(--navy)");
    try{
      const archivos=await Promise.all([...files].map(fl=>fileToB64(fl).then(b=>({nombre:fl.name,tipo:fl.type||"application/octet-stream",tamanio:fl.size,contenido:b}))));
      const payload=Object.assign({},meta,{archivos});
      if(!FLOW_DOCS_URL){setS("Envío preparado. Falta configurar la URL del flujo.","var(--amber)");return;}
      setS("Enviando a la Unidad Operativa…","var(--navy)");
      const r=await fetch(FLOW_DOCS_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      if(!r.ok)throw new Error("HTTP "+r.status);
      ov(c).pendienteEnvio=null;saveCLM();
      logAdd("📤",`Enviado a la Unidad Operativa: ${ctx.tipoEnvio} (${archivos.length} archivo/s)`,c.nro);
      setS(`✓ Enviado. Se subieron ${archivos.length} archivo(s).`);
      toast("Enviado a la Unidad Operativa.");
      setTimeout(()=>{closeModal(o);render();},900);
    }catch(e){setS("No se pudo enviar ("+((e&&e.message)||"error")+"). Revisa la conexión.","var(--red)");}
  };
}

function vReportes(){
  const mine=myContracts();
  function agg(keyFn){
    const m={};
    mine.forEach(c=>{const k=keyFn(c)||"—";
      if(!m[k])m[k]={n:0,monto:0,ven:0};
      m[k].n++;m[k].monto+=montoDe(c);
      if(statusLive(c).key==="vencido")m[k].ven++;});
    return Object.entries(m).sort((a,b)=>b[1].monto-a[1].monto);
  }
  const total=mine.reduce((a,c)=>a+montoDe(c),0);
  const porCat=agg(c=>c.cat),porArea=agg(c=>c.area),porAC=agg(c=>c.ac);
  const tbl=(rows,label)=>`<div class="tablewrap"><table class="list" style="min-width:0">

    <div class="toolbar">
      <div style="flex:1"><p class="psub" style="margin:0">Analítica del portafolio ${SES.rol==="uo"?"completo":"asignado"} · ${mine.length} contratos · ${money(total)} en total.</p></div>

    <div class="charts">
      <div class="panel"><p class="ptitle">Monto por categoría</p><p class="psub">valor total vigente por tipo de gasto</p>
        ${barChartH(porCat.slice(0,10).map(([label,v])=>({label,value:v.monto,tip:`<b>${esc(label)}</b><br>${v.n} contrato(s) · ${money(v.monto)}`})),v=>moneyShort(v))}</div>
      <div class="panel"><p class="ptitle">Monto por área protegida</p><p class="psub">top 10 de ${porArea.length} áreas</p>
        ${barChartH(porArea.slice(0,10).map(([label,v])=>({label,value:v.monto,tip:`<b>${esc(label)}</b><br>${v.n} contrato(s) · ${money(v.monto)}`})),v=>moneyShort(v))}</div>
    </div>
    <div class="charts" style="grid-template-columns:1fr 1fr">
      <div><p class="ptitle" style="margin:6px 0 8px">Resumen por categoría</p>${tbl(porCat,"Categoría")}</div>
      <div><p class="ptitle" style="margin:6px 0 8px">Resumen por AC</p>${tbl(porAC.slice(0,15),"Administradora")}</div>
    </div>
  </div>`;
  $("#expCsv").onclick=()=>{
    const BOM="\uFEFF";
    const head=["Nro","Objeto","Area","Categoria","Proveedor","AC","Monto original","Monto vigente","Inicio","Firma","Fin","Estado","Adenda","Calificacion"];
    const rows=mine.map(c=>{const o=ov(c);return [c.nro,c.detalle,c.area,c.cat,c.proveedor,c.ac,c.monto,montoDe(c),c.inicio,c.firma,c.fin,statusLive(c).label,tieneAdenda(c)?(c.tipoAdenda||"Sí"):"No",o.evaluado?o.score:""].map(v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`).join(";");});

function vFrame(src,notice){
  $("#view").innerHTML=`
    <div class="framebar"><span>🧩</span><span style="flex:1">${esc(notice)}</span><a class="btn sm line" href="${esc(src)}" target="_blank" rel="noopener">Abrir en pestaña propia ↗</a></div>
    <iframe class="toolframe" id="toolframe" src="${esc(src)}" title="Herramienta integrada"></iframe>`;
  /* Si la herramienta no carga (p. ej. el archivo del CLM se abrió suelto,
     fuera del sitio publicado), mostrar una explicación en vez de un recuadro roto.
     La Mágica pesa ~2 MB: mientras readyState sea "loading" hay que esperar, no juzgar. */
  let intentos=0;
  (function vigilarFrame(){
    const f=document.getElementById("toolframe");
    if(!f)return;
    let st=null,fallo=false;
    try{
      st=f.contentDocument?{rs:f.contentDocument.readyState,kids:f.contentDocument.body?f.contentDocument.body.children.length:0}:null;
    }catch(e){fallo=true;/* las herramientas son del mismo sitio: documento inaccesible = página de error del navegador */}
    if(st&&st.kids>0)return;                                   // cargó bien
    intentos++;
    /* documento nulo o inaccesible = página de error del navegador (las herramientas son del mismo sitio) */
    if(intentos>=4&&(fallo||!st||(st.rs!=="loading"&&st.kids===0))){
      f.outerHTML=`<div class="content"><div class="panel up" style="max-width:640px;margin:30px auto;text-align:center">
        <div style="font-size:38px;margin-bottom:10px">🔌</div>
        <p class="ptitle" style="font-size:16px">La herramienta no está disponible desde aquí</p>
        <p class="psub" style="max-width:460px;margin:0 auto 16px">Este archivo del CLM se abrió <b>fuera del sitio publicado</b>, y las herramientas integradas viven en carpetas vecinas del repositorio. En el sitio publicado en GitHub Pages este módulo carga completo, aquí mismo.</p>
        <a class="btn" href="${esc(src)}" target="_blank" rel="noopener">Intentar abrir en pestaña propia ↗</a>
      </div></div>`;
      return;
    }
    if(intentos<40)setTimeout(vigilarFrame,800);               // sigue cargando: paciencia
  })();
}

/* ================= ARRANQUE ================= */
loadCLM();
async function boot(){
  try{
    const r=await fetch(DATA_URL,{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const data=await fapMaybe(await r.json());
    if(Array.isArray(data)&&data.length){
      CONTRACTS=data;
      dataSource={label:`Base viva · ${data.length} contratos`,live:true};
    }
  }catch(e){}
  if(!CONTRACTS.length){
    try{
      const seed=await fapMaybe(JSON.parse(document.getElementById("seed-data").textContent));
      if(Array.isArray(seed)&&seed.length){
        CONTRACTS=seed;
        dataSource={label:`Copia embebida · ${seed.length} contratos`,live:false};
      }
    }catch(e2){}
  }
  if(!CONTRACTS.length)dataSource={label:"Sin datos disponibles",live:false};
  const m=location.hash.match(/^#\/([a-z]+)(?:\/(\d+))?/);
  if(m&&VIEWS[m[1]]){ST.view=m[1];if(m[2]!=null)ST.cur=+m[2];}
  render();
}
boot();
</script>
